<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>东东题库 - 材料大题</title>
    <style>
        :root {
            --bg: #f3f8fc;
            --card: #ffffff;
            --border: #d0e4f5;
            --accent: #5b9bd5;
            --accent-light: #7db9e8;
            --accent-dark: #3d7ab8;
            --correct: #2d8a4e;
            --wrong: #e74c3c;
            --tag-bg: #e8f2fa;
            --shadow: 0 2px 12px rgba(60, 100, 160, 0.07);
            --radius: 14px;
            --font-main: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', 'KaiTi', serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background: linear-gradient(180deg, #eef5fb 0%, #e3eff9 30%, #f5f9fd 100%);
            min-height: 100vh;
            padding-bottom: 20px;
            color: #2c3e50;
            line-height: 1.7;
            -webkit-tap-highlight-color: transparent;
        }
        .app-header {
            background: linear-gradient(135deg, #5b9bd5 0%, #4a8bc2 40%, #3d7ab8 100%);
            color: #fff;
            padding: 0.9rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 16px rgba(60, 100, 160, 0.2);
            border-bottom: 2px solid #7db9e8;
            border-radius: 0 0 16px 16px;
        }
        .app-header h1 {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            letter-spacing: 2px;
            font-weight: 700;
            margin: 0;
        }
        .app-header .subtitle {
            font-size: 0.8rem;
            opacity: 0.9;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .header-emoji {
            font-size: 1.7rem;
            display: block;
            margin-bottom: 2px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .back-home-link {
            display: inline-block;
            margin-top: 0.3rem;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            text-decoration: underline;
        }
        .back-home-link:hover { color: #fff; }
        .main-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 0.7rem 0.8rem 0.5rem;
        }
        .btn {
            background: #5b9bd5;
            color: #fff;
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 22px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            min-height: 42px;
            box-shadow: 0 2px 8px rgba(91,155,213,0.2);
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.94); }
        .btn-outline {
            background: #fff;
            border: 2px solid #5b9bd5;
            color: #5b9bd5;
            box-shadow: none;
        }
        .btn-print {
            background: #fff;
            border: 2px solid #6a9ab8;
            color: #6a9ab8;
            padding: 0.4rem 1rem;
            border-radius: 18px;
            font-weight: 600;
            font-size: 0.78rem;
            cursor: pointer;
        }
        .question-card {
            background: #fff;
            border: 1.5px solid #dceaf5;
            border-radius: var(--radius);
            padding: 0.9rem 0.9rem;
            margin-bottom: 1rem;
            transition: all 0.25s;
            box-shadow: var(--shadow);
        }
        .material-box {
            background: #f8fbfe;
            border-left: 4px solid #5b9bd5;
            padding: 0.8rem 0.9rem;
            margin: 0.5rem 0 0.7rem;
            border-radius: 0 10px 10px 0;
            font-family: var(--font-serif);
            font-size: 0.88rem;
            white-space: pre-line;
            color: #2c3e50;
            line-height: 1.8;
        }
        .fill-blank-input {
            border: none;
            border-bottom: 2px solid #5b9bd5;
            padding: 0.2rem 0.5rem;
            font-size: 1rem;
            width: 140px;
            text-align: center;
            background: #fafcfe;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s;
            font-family: var(--font-serif);
        }
        .fill-blank-input:focus {
            outline: none;
            border-bottom-color: #3d7ab8;
            background: #f0f7fd;
            width: 170px;
        }
        .fill-blank-input:disabled { opacity: 1; color: #2c3e50; }
        .fill-blank-input.correct-fill { border-bottom-color: #2d8a4e; background: #f4faf6; color: #2d8a4e; }
        .fill-blank-input.wrong-fill { border-bottom-color: #e74c3c; background: #fef8f7; color: #e74c3c; }
        .fill-hint { font-size: 0.7rem; color: #8aabc8; margin-left: 0.3rem; }
        .nav-buttons { display: flex; gap: 0.5rem; justify-content: flex-start; flex-wrap: wrap; margin: 0.5rem 0; }
        .stats-panel { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.6rem 0; justify-content: center; }
        .stat-tag {
            background: #e8f2fa;
            padding: 0.3rem 0.7rem;
            border-radius: 12px;
            font-size: 0.72rem;
            color: #3d7ab8;
            font-weight: 500;
            border: 1px solid #d0e4f5;
        }
        .stat-tag.streak-tag { background: #fff3e0; color: #e65100; border-color: #ffcc80; }
        .collapse-header {
            background: #f0f7fd;
            padding: 0.7rem 0.9rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            color: #3d7ab8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            user-select: none;
            border: 1px solid #d0e4f5;
        }
        .collapse-header .collapse-arrow { transition: transform 0.3s; }
        .collapse-header.open .collapse-arrow { transform: rotate(180deg); }
        .collapse-body {
            display: none;
            padding: 0.6rem 0.8rem;
            background: #fafcfe;
            border-radius: 0 0 10px 10px;
            border: 1px solid #e0edf8;
            border-top: none;
            font-size: 0.82rem;
            line-height: 1.7;
            color: #3d4f5f;
        }
        .review-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.4rem 0;
            font-size: 0.78rem;
        }
        .review-table td {
            padding: 0.35rem 0.5rem;
            border-bottom: 1px solid #e0edf8;
            vertical-align: top;
        }
        .review-table .step-label { font-weight: 700; color: #3d7ab8; white-space: nowrap; width: 30%; }
        .review-table .correct-mark { color: #2d8a4e; font-weight: 700; }
        .review-table .wrong-mark { color: #e74c3c; font-weight: 700; }
        .streak-toast {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6b6b, #ff8c00);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 300;
            animation: streakPopIn 0.4s ease, streakFadeOut 0.3s ease 1.8s forwards;
            box-shadow: 0 4px 16px rgba(255, 107, 107, 0.4);
            pointer-events: none;
        }
        @keyframes streakPopIn {
            0% { transform: translateX(-50%) scale(0.3); opacity: 0; }
            60% { transform: translateX(-50%) scale(1.15); }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        @keyframes streakFadeOut {
            to { opacity: 0; transform: translateX(-50%) translateY(-15px); }
        }
        .celebrate-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(30,50,80,0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .celebrate-card {
            background: #fff;
            border-radius: 20px;
            padding: 1.8rem 1.3rem;
            text-align: center;
            max-width: 320px;
            width: 88%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .print-header, .print-footer { display: none; }
        @media print {
            @page { size: A4; margin: 15mm; }
            body { background: white !important; -webkit-print-color-adjust: exact; }
            .app-header, .btn, .btn-outline, .btn-print, .nav-buttons, .back-home-link, .no-print { display: none !important; }
            .app-header { display: block !important; background: white !important; color: #333 !important; border-bottom: 2px solid #333 !important; }
            .question-card { break-inside: avoid; border: 1px solid #ccc !important; }
            .fill-blank-input { border: none !important; border-bottom: 1px solid #333 !important; background: transparent !important; }
            .print-header { display: block !important; text-align: center; margin-bottom: 0.8rem; }
            .print-footer { display: block !important; text-align: center; margin-top: 0.8rem; font-size: 0.7rem; }
        }
        h3 { color: #3d7ab8; margin-bottom: 0.5rem; text-align: center; }
    </style>
</head>
<body>

<div class="app-header">
    <span class="header-emoji">📜</span>
    <h1 id="header-title">东东题库 · 材料大题</h1>
    <div class="subtitle" id="header-subtitle">加载中...</div>
    <a class="back-home-link" href="index.html">← 返回首页</a>
</div>

<div class="main-content" id="main-content">
    <div style="text-align:center;padding:2rem;">加载中...</div>
</div>

<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const subject = params.get('subject') || 'history';
    const dataUrl = `data/material-${subject}.json`;

    let materialQuestions = [];
    let subjectName = '历史';
    let materialStates = {};
    let currentStreak = parseInt(localStorage.getItem(`material-${subject}-streak`) || '0');
    let bestStreak = parseInt(localStorage.getItem(`material-${subject}-bestStreak`) || '0');

    const encourageMessages = {
        correct: ['答对了！👏', '太棒了！💪', '优秀！🎯', '继续前进！📚'],
        wrong: ['别灰心，加油！💪', '再试试看～', '记住这个知识点！📝'],
        complete: ['完美通关！🏆', '太厉害了！🎉', '材料题全对！👑'],
        streak: { 3: '🔥 三连击！', 5: '💯 五连击！', 10: '🏆 十连击！' }
    };

    function randomPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function saveStreak() { 
        localStorage.setItem(`material-${subject}-streak`, currentStreak);
        localStorage.setItem(`material-${subject}-bestStreak`, bestStreak);
    }

    function showStreakToast(message) {
        const toast = document.createElement('div');
        toast.className = 'streak-toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }

    function checkStreakEncourage() {
        const streaks = Object.keys(encourageMessages.streak).map(Number).sort((a,b)=>b-a);
        for (let threshold of streaks) {
            if (currentStreak === threshold) { showStreakToast(encourageMessages.streak[threshold]); break; }
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function checkBlankAnswer(blank, userAnswer) {
        if (!userAnswer || userAnswer.trim() === '') return false;
        return blank.answers.some(ans => userAnswer.trim().toLowerCase() === ans.toLowerCase());
    }

    function showCelebrate() {
        const overlay = document.createElement('div');
        overlay.className = 'celebrate-overlay';
        overlay.innerHTML = `<div class="celebrate-card"><div class="celebrate-emoji" style="font-size:3rem;">🎉</div><div class="celebrate-text">${randomPick(encourageMessages.complete)}</div><div class="celebrate-sub">所有材料题已满分完成！</div><button class="btn" id="btn-celebrate-ok">👍 好的</button></div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('#btn-celebrate-ok').addEventListener('click', () => overlay.remove());
        overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    }

    function renderMaterialView() {
        const container = document.getElementById('main-content');
        let allCompleted = true;
        let html = '<h3>📜 材料解析大题</h3>';
        html += '<div class="no-print" style="text-align:center;margin-bottom:0.6rem;">';
        html += `<button class="btn-print" onclick="window.print()">🖨️ 打印全部材料题</button>`;
        html += `</div>`;
        html += '<div class="print-header"><h2>📝 东东题库 · 材料大题汇编</h2><div class="print-date">打印日期：' + new Date().toLocaleDateString('zh-CN') + '</div></div>';
        
        if (materialQuestions.length === 0) {
            html += '<div style="text-align:center;padding:2rem;color:#8aabc8;">暂无材料题数据，请检查 data/material-' + subject + '.json 文件</div>';
        }
        
        materialQuestions.forEach(mat => {
            if (!materialStates[mat.id]) materialStates[mat.id] = { submitted: false, userAnswers: {}, score: null };
            const state = materialStates[mat.id];
            const isSubmitted = state.submitted;
            const totalScore = mat.totalScore || mat.blanks.reduce((sum, b) => sum + (b.score || 1), 0);
            
            if (!isSubmitted) allCompleted = false;
            
            html += `<div class="question-card" data-matid="${mat.id}">
                <div style="font-weight:700;color:#3d7ab8;margin-bottom:0.5rem;font-size:1.1rem;">${mat.title}</div>
                <div class="material-box">${mat.material.replace(/\n/g,'<br>')}</div>
                <div style="font-size:0.95rem;color:#4a5f70;margin:0.5rem 0;background:#f0f7fd;padding:0.5rem;border-radius:8px;">📋 ${mat.question}</div>
                <div class="fill-blanks-area" style="margin:0.8rem 0;">`;
            
            mat.blanks.forEach(blank => {
                const userVal = state.userAnswers[blank.id] || '';
                let inputClass = '';
                if (isSubmitted) {
                    const isCorrect = checkBlankAnswer(blank, userVal);
                    inputClass = isCorrect ? 'correct-fill' : 'wrong-fill';
                }
                html += `<div style="margin:0.6rem 0;display:flex;align-items:center;flex-wrap:wrap;gap:0.3rem;">
                    <span style="font-weight:700;color:#3d7ab8;min-width:45px;">${blank.label || blank.id}</span>
                    <input type="text" class="fill-blank-input ${inputClass}" data-matid="${mat.id}" data-blank-id="${blank.id}" 
                        value="${escapeHtml(userVal)}" placeholder="${blank.hint || '请输入'}" ${isSubmitted ? 'disabled' : ''}
                        style="flex:1;min-width:120px;">
                    ${!isSubmitted ? `<span class="fill-hint">💡 ${blank.hint || ''}</span>` : ''}
                </div>`;
            });
            html += `</div>`;
            
            if (!isSubmitted) {
                html += `<div class="nav-buttons">
                    <button class="btn" data-mat-submit="${mat.id}">✅ 提交答案（统一批改）</button>
                </div>`;
            } else {
                const earnedScore = state.score || 0;
                html += `<div style="margin:0.6rem 0;padding:0.5rem;background:#e8f2fa;border-radius:10px;">
                    <span style="font-weight:700;">📊 得分：${earnedScore} / ${totalScore} 分</span>
                    <button class="btn-outline" style="margin-left:0.8rem;padding:0.2rem 0.8rem;font-size:0.75rem;" data-mat-reset="${mat.id}">🔄 重做</button>
                </div>`;
            }
            
            html += `<div class="collapse-header" data-mat-collapse="${mat.id}">
                📖 查看答案解析 <span class="collapse-arrow">▼</span>
            </div>
            <div class="collapse-body" data-mat-body="${mat.id}" style="display:none;">
                <strong>📝 逐空解析：</strong><table class="review-table">`;
            
            mat.blanks.forEach(blank => {
                const userVal = state.userAnswers[blank.id] || '未作答';
                const isCorrect = isSubmitted ? checkBlankAnswer(blank, userVal) : false;
                const correctStr = blank.answers.slice(0, 3).join('、');
                html += `<tr><td class="step-label">${blank.label || blank.id}</td>
                    <td>你的答案：${escapeHtml(userVal)}<br>正确答案：${escapeHtml(correctStr)}<br>
                    <span style="font-size:0.75rem;color:#6a9ab8;">💡 ${blank.explanation || ''}</span>
                    ${isSubmitted ? (isCorrect ? '<span class="correct-mark"> ✓ 得分</span>' : '<span class="wrong-mark"> ✗ 失分</span>') : ''}
                    </td>
                </tr>`;
            });
            html += `</table><strong>📌 题型总结：</strong>${mat.reviewSummary}<br><br>
                <strong>📝 完整参考答案：</strong>${mat.fullAnswer}
            </div>
            <div class="print-footer" style="margin-top:0.5rem;">—— 以上为《${mat.title}》——</div>
            </div>`;
        });
        
        html += '<div class="print-footer">东东题库 · 广东中考专项突破 · 材料大题</div>';
        
        if (allCompleted && materialQuestions.length > 0) {
            html += `<div style="text-align:center;margin-top:1rem;"><button class="btn" id="btn-celebrate" style="background:#2d8a4e;">🎉 查看通关庆祝</button></div>`;
        }
        
        html += `<div class="stats-panel">
            ${currentStreak > 0 ? `<span class="stat-tag streak-tag">🔥 当前连击：${currentStreak}</span>` : ''}
            ${bestStreak > 0 ? `<span class="stat-tag">🏆 最佳连击：${bestStreak}</span>` : ''}
        </div>`;
        
        container.innerHTML = html;
        
        container.querySelectorAll('.fill-blank-input:not([disabled])').forEach(input => {
            input.addEventListener('change', function() {
                const matId = this.dataset.matid;
                const blankId = this.dataset.blankId;
                if (!materialStates[matId]) materialStates[matId] = { submitted: false, userAnswers: {} };
                if (!materialStates[matId].submitted) {
                    materialStates[matId].userAnswers[blankId] = this.value;
                }
            });
        });
        
        container.querySelectorAll('[data-mat-submit]').forEach(btn => {
            btn.addEventListener('click', function() { handleMaterialSubmit(this.dataset.matSubmit); });
        });
        
        container.querySelectorAll('[data-mat-reset]').forEach(btn => {
            btn.addEventListener('click', function() { resetMaterialQuestion(this.dataset.matReset); });
        });
        
        container.querySelectorAll('.collapse-header').forEach(header => {
            header.addEventListener('click', function() {
                this.classList.toggle('open');
                const body = document.querySelector(`[data-mat-body="${this.dataset.matCollapse}"]`);
                if (body) { body.style.display = body.style.display === 'none' ? 'block' : 'none'; }
            });
        });
        
        const celeBtn = document.getElementById('btn-celebrate');
        if (celeBtn) celeBtn.addEventListener('click', showCelebrate);
    }

    function handleMaterialSubmit(matId) {
        const mat = materialQuestions.find(m => m.id === matId);
        const state = materialStates[matId];
        if (!mat || !state) return;
        if (state.submitted) { alert('本题已经提交过了！如需重做请点击"重做"按钮。'); return; }
        
        let totalEarned = 0;
        const totalScore = mat.totalScore || mat.blanks.reduce((sum, b) => sum + (b.score || 1), 0);
        
        mat.blanks.forEach(blank => {
            const userVal = state.userAnswers[blank.id] || '';
            if (checkBlankAnswer(blank, userVal)) { totalEarned += (blank.score || 1); }
        });
        
        state.submitted = true;
        state.score = totalEarned;
        
        if (totalEarned === totalScore) {
            currentStreak++;
            if (currentStreak > bestStreak) { bestStreak = currentStreak; saveStreak(); }
            checkStreakEncourage();
        } else {
            currentStreak = 0;
            saveStreak();
        }
        
        renderMaterialView();
    }

    function resetMaterialQuestion(matId) {
        if (confirm('确定要重做本题吗？之前的答案将被清空。')) {
            materialStates[matId] = { submitted: false, userAnswers: {}, score: null };
            renderMaterialView();
        }
    }

    async function init() {
        try {
            const response = await fetch(dataUrl);
            if (!response.ok) throw new Error('材料题加载失败: ' + response.status);
            const data = await response.json();
            materialQuestions = data.materialQuestions || [];
            subjectName = data.subjectName || '历史';
            document.getElementById('header-title').textContent = `东东题库 · ${subjectName}材料大题`;
            document.getElementById('header-subtitle').textContent = '6道精选题 · 四步解题法 · 逐空批改';
            document.title = `东东的${subjectName}材料大题`;
            renderMaterialView();
            console.log('📜 材料题已就绪！共 ' + materialQuestions.length + ' 道大题');
        } catch (err) {
            console.error('材料题加载错误:', err);
            document.getElementById('main-content').innerHTML = `<div style="text-align:center;padding:3rem;color:#e74c3c;">
                <h3>⚠️ 材料题加载失败</h3>
                <p>请检查 data/material-${subject}.json 文件是否存在</p>
                <p style="font-size:0.8rem;color:#8aabc8;">错误信息：${err.message}</p>
                <a href="index.html" style="color:#3d7ab8;">← 返回首页</a>
            </div>`;
        }
    }
    init();
})();
</script>
</body>
</html>
