<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>英语语法题库 - 广东中考专项训练</title>
    <style>
        :root {
            --bg: #f3f8fc;
            --card: #ffffff;
            --border: #d0e4f5;
            --accent: #5b9bd5;
            --accent-dark: #3d7ab8;
            --correct: #27ae60;
            --wrong: #e74c3c;
            --keyword: #e74c3c;
            --shadow: 0 2px 12px rgba(60,100,160,0.07);
            --radius: 14px;
            --font-main: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;
            --font-serif: 'Noto Serif SC','STSong','SimSun','KaiTi',serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-main);
            background: linear-gradient(180deg, #eef5fb 0%, #e3eff9 30%, #f5f9fd 100%);
            min-height: 100vh;
            color: #2c3e50;
            line-height: 1.7;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, #5b9bd5 0%, #4a8bc2 40%, #3d7ab8 100%);
            color: #fff;
            padding: 1.2rem 1rem;
            text-align: center;
            box-shadow: 0 3px 16px rgba(60,100,160,0.2);
            border-radius: 0 0 16px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header .back-btn {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .app-header .back-btn:hover { background: rgba(255,255,255,0.35); }
        .app-header h1 {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            letter-spacing: 1px;
            font-weight: 700;
            margin: 0;
        }
        .app-header .subtitle {
            font-size: 0.78rem;
            opacity: 0.9;
            margin-top: 2px;
        }

        /* Main Content */
        .main-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 1rem 0.8rem 2rem;
        }

        /* Module Selector */
        .module-selector {
            background: #fff;
            border-radius: var(--radius);
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: 2px solid #d0e4f5;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .module-selector label {
            font-weight: 700;
            font-size: 0.9rem;
            color: #3d7ab8;
            white-space: nowrap;
        }
        .module-selector select {
            flex: 1;
            min-width: 180px;
            padding: 0.5rem 0.8rem;
            border: 2px solid #d0e4f5;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: var(--font-main);
            color: #2c3e50;
            background: #fafcfe;
            cursor: pointer;
            transition: all 0.2s;
        }
        .module-selector select:focus {
            outline: none;
            border-color: #5b9bd5;
            box-shadow: 0 0 0 3px rgba(91,155,213,0.1);
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #d0e4f5;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-main);
            color: #5b9bd5;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .mode-btn.active {
            background: #5b9bd5;
            color: #fff;
            border-color: #5b9bd5;
        }
        .mode-btn:hover { border-color: #5b9bd5; }

        /* Knowledge Card */
        .knowledge-card {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cd 100%);
            border: 2px solid #f0d87e;
            border-radius: var(--radius);
            padding: 0.9rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #7a6500;
            line-height: 1.6;
        }
        .knowledge-card strong { color: #c79100; }

        /* Part Section */
        .part-section {
            margin-bottom: 1.5rem;
        }
        .part-title {
            font-weight: 700;
            font-size: 1rem;
            color: #3d7ab8;
            margin-bottom: 0.6rem;
            padding: 0.5rem 0.8rem;
            background: #e8f2fa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .part-instructions {
            font-size: 0.82rem;
            color: #6a9ab8;
            margin-bottom: 0.8rem;
            padding-left: 0.3rem;
        }

        /* ========== PASSAGE + STEP MODE (Cloze & Reading) ========== */
        .step-container {
            background: #fff;
            border-radius: var(--radius);
            border: 2px solid #d0e4f5;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 1rem;
        }

        /* Passage area */
        .passage-area {
            padding: 1rem 1.2rem;
            border-bottom: 2px solid #e8f2fa;
            max-height: 240px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 2.1;
            background: #fdfeff;
            position: relative;
        }
        .passage-area .cloze-blank {
            display: inline-block;
            min-width: 60px;
            padding: 0.1rem 0.6rem;
            margin: 0 2px;
            border-radius: 6px;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s;
            background: #e8f2fa;
            color: #5b9bd5;
            border-bottom: 2px dashed #5b9bd5;
            cursor: pointer;
        }
        .passage-area .cloze-blank.current {
            background: #fff3cd;
            color: #c79100;
            border-bottom: 3px solid #f0c040;
            animation: pulse 1.2s ease-in-out infinite;
            box-shadow: 0 0 8px rgba(240,192,64,0.4);
        }
        .passage-area .cloze-blank.answered {
            background: #d4efdf;
            color: #1a6e3e;
            border-bottom: 2px solid #27ae60;
        }
        .passage-area .cloze-blank.wrong-mark {
            background: #fde0dc;
            color: #a82020;
            border-bottom: 2px solid #e74c3c;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 4px rgba(240,192,64,0.3); }
            50% { box-shadow: 0 0 14px rgba(240,192,64,0.7); }
        }

        /* Step question area */
        .step-question-area {
            padding: 1rem 1.2rem;
            min-height: 160px;
        }
        .step-progress {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            font-size: 0.8rem;
            color: #6a9ab8;
            font-weight: 600;
        }
        .step-progress .progress-bar-outer {
            flex: 1;
            height: 6px;
            background: #e8f2fa;
            border-radius: 3px;
            overflow: hidden;
        }
        .step-progress .progress-bar-inner {
            height: 100%;
            background: #5b9bd5;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .step-stem {
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            line-height: 1.7;
            padding: 0.5rem 0.7rem;
            background: #fafcfe;
            border-radius: 8px;
            border-left: 3px solid #5b9bd5;
        }
        .step-options {
            list-style: none;
            padding: 0;
            margin-bottom: 0.8rem;
        }
        .step-option-btn {
            display: block;
            width: 100%;
            padding: 0.7rem 1rem;
            margin-bottom: 0.4rem;
            border: 2px solid #e8f2fa;
            border-radius: 10px;
            background: #fafcfe;
            cursor: pointer;
            font-size: 0.9rem;
            text-align: left;
            font-family: var(--font-main);
            transition: all 0.2s;
            color: #2c3e50;
        }
        .step-option-btn:hover { border-color: #5b9bd5; background: #f0f7fd; }
        .step-option-btn.selected { border-color: #5b9bd5; background: #e3f0fb; font-weight: 600; }
        .step-option-btn.correct-show { border-color: var(--correct); background: #d4efdf; color: #1a6e3e; font-weight: 700; }
        .step-option-btn.wrong-show { border-color: var(--wrong); background: #fde0dc; color: #a82020; }

        /* Step navigation */
        .step-nav {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
        }
        .step-nav-btn {
            padding: 0.55rem 1.2rem;
            border: 2px solid #d0e4f5;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-main);
            font-weight: 600;
            color: #5b9bd5;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .step-nav-btn:hover { border-color: #5b9bd5; background: #f0f7fd; }
        .step-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .step-nav-btn.primary-nav { background: #5b9bd5; color: #fff; border-color: #5b9bd5; }
        .step-nav-btn.primary-nav:hover { background: #4a8bc2; }

        /* Step analysis */
        .step-analysis {
            margin-top: 0.6rem;
            padding: 0.7rem 0.9rem;
            background: #fdf6e3;
            border-left: 4px solid #f0c040;
            border-radius: 0 10px 10px 0;
            font-size: 0.85rem;
            line-height: 1.7;
            display: none;
        }
        .step-analysis.show { display: block; }

        /* Standard Question Card (for 语法选择/短文填空/回答问题) */
        .question-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 1.2rem 1rem;
            margin-bottom: 0.8rem;
            border: 2px solid #d0e4f5;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            position: relative;
        }
        .question-card.correct { border-color: var(--correct); background: #f0faf5; }
        .question-card.wrong { border-color: var(--wrong); background: #fef5f5; }
        .question-num {
            display: inline-block;
            background: #5b9bd5;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 0.5rem;
        }
        .question-stem {
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            line-height: 1.8;
            display: inline;
        }
        .keyword, .passage-area .keyword, .step-stem .keyword, .question-stem .keyword {
            color: #e74c3c !important;
            font-weight: 700 !important;
            background: #fff5f5;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            border-bottom: 2px solid #e74c3c;
        }

        /* Options */
        .options-list { list-style: none; padding: 0; }
        .option-item {
            display: block;
            width: 100%;
            padding: 0.7rem 1rem;
            margin-bottom: 0.4rem;
            border: 2px solid #e8f2fa;
            border-radius: 10px;
            background: #fafcfe;
            cursor: pointer;
            font-size: 0.9rem;
            text-align: left;
            font-family: var(--font-main);
            transition: all 0.2s;
            color: #2c3e50;
        }
        .option-item:hover { border-color: #5b9bd5; background: #f0f7fd; }
        .option-item.selected { border-color: #5b9bd5; background: #e3f0fb; font-weight: 600; }
        .option-item.correct-answer { border-color: var(--correct); background: #d4efdf; color: #1a6e3e; font-weight: 700; }
        .option-item.wrong-answer { border-color: var(--wrong); background: #fde0dc; color: #a82020; }

        /* Fill-in input */
        .fill-input {
            width: 100%;
            max-width: 250px;
            padding: 0.6rem 1rem;
            border: 2px solid #d0e4f5;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: var(--font-main);
            transition: all 0.2s;
            background: #fafcfe;
        }
        .fill-input:focus { outline: none; border-color: #5b9bd5; box-shadow: 0 0 0 3px rgba(91,155,213,0.1); }
        .fill-input.correct-fill { border-color: var(--correct); background: #f0faf5; }
        .fill-input.wrong-fill { border-color: var(--wrong); background: #fef5f5; }

        /* Analysis */
        .analysis-box {
            margin-top: 0.8rem;
            padding: 0.8rem 1rem;
            background: #fdf6e3;
            border-left: 4px solid #f0c040;
            border-radius: 0 10px 10px 0;
            font-size: 0.85rem;
            line-height: 1.7;
            display: none;
        }
        .analysis-box.show { display: block; }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-primary { background: #5b9bd5; color: #fff; }
        .btn-primary:hover { background: #4a8bc2; transform: translateY(-1px); }
        .btn-outline { background: #fff; color: #5b9bd5; border: 2px solid #5b9bd5; }
        .btn-outline:hover { background: #f0f7fd; }
        .btn-check { background: #27ae60; color: #fff; }
        .btn-check:hover { background: #219a52; }

        /* Score Bar */
        .score-bar {
            background: #fff;
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #d0e4f5;
            box-shadow: var(--shadow);
            text-align: center;
            display: none;
        }
        .score-bar.show { display: block; }
        .score-num {
            font-size: 2rem;
            font-weight: 700;
            color: #5b9bd5;
        }
        .score-text { font-size: 0.85rem; color: #6a9ab8; }

        /* Template Card */
        .template-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 1.2rem 1rem;
            margin-bottom: 1rem;
            border: 2px solid #f0d87e;
            box-shadow: var(--shadow);
        }
        .template-card h3 {
            color: #c79100;
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }
        .template-suitable {
            font-size: 0.8rem;
            color: #8a7a30;
            margin-bottom: 0.8rem;
            padding: 0.3rem 0.6rem;
            background: #fff9e6;
            border-radius: 8px;
            display: inline-block;
        }
        .template-structure {
            font-size: 0.88rem;
            line-height: 1.9;
            padding: 0.8rem;
            background: #fafcfe;
            border-radius: 10px;
            border: 1px solid #e8f2fa;
        }
        .template-example {
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: #f0faf5;
            border-radius: 10px;
            border: 1px solid #d4efdf;
            font-size: 0.85rem;
            line-height: 1.8;
        }
        .template-example strong { color: #1a6e3e; }

        /* Table in template */
        .template-structure table {
            font-size: 0.85rem;
            width: 100%;
            border-collapse: collapse;
        }
        .template-structure th {
            background: #e8f2fa;
            padding: 6px 8px;
            border: 1px solid #d0e4f5;
            color: #3d7ab8;
        }
        .template-structure td {
            padding: 6px 8px;
            border: 1px solid #d0e4f5;
        }

        /* Reference answer */
        .reference-answer {
            background: #f0faf5;
            border: 1px solid #d4efdf;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            display: none;
        }
        .reference-answer.show { display: block; }
        .scoring-points {
            background: #fff9e6;
            border: 1px solid #f0d87e;
            border-radius: 8px;
            padding: 0.5rem 0.8rem;
            margin-top: 0.3rem;
            font-size: 0.82rem;
            color: #7a6500;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .app-header h1 { font-size: 1.1rem; }
            .app-header .back-btn { padding: 0.3rem 0.6rem; font-size: 0.78rem; left: 0.5rem; }
            .question-card { padding: 1rem 0.8rem; }
            .option-item { padding: 0.6rem 0.8rem; font-size: 0.85rem; }
            .module-selector { padding: 0.6rem 0.8rem; }
            .mode-btn { padding: 0.4rem 0.7rem; font-size: 0.78rem; }
            .passage-area { max-height: 180px; font-size: 0.82rem; padding: 0.8rem; }
            .step-question-area { padding: 0.8rem; }
            .step-nav-btn { padding: 0.45rem 0.9rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <h1>📝 英语语法题库</h1>
        <div class="subtitle" id="headerTitle">广东中考 · 专项突破</div>
    </div>

    <div class="main-content">
        <!-- Module Selector -->
        <div class="module-selector">
            <label for="moduleSelect">📂 选择模块：</label>
            <select id="moduleSelect" onchange="switchModule()">
                <option value="">加载中...</option>
            </select>
        </div>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="practice" onclick="setMode('practice')">📝 练习模式</button>
            <button class="mode-btn" data-mode="review" onclick="setMode('review')">👀 浏览模式</button>
        </div>

        <!-- Knowledge Card -->
        <div class="knowledge-card" id="knowledgeCard" style="display:none;"></div>

        <!-- Score Bar -->
        <div class="score-bar" id="scoreBar">
            <div class="score-num" id="scoreNum">0/0</div>
            <div class="score-text" id="scoreText">完成题目即可查看得分</div>
        </div>

        <!-- Content Area -->
        <div id="contentArea"></div>

        <!-- Action Buttons -->
        <div class="btn-row" id="actionBtns" style="display:none;">
            <button class="btn btn-check" onclick="checkAll()">✅ 全部检查</button>
            <button class="btn btn-outline" onclick="resetAll()">🔄 全部重做</button>
            <button class="btn btn-outline" onclick="showAllAnalysis()">💡 显示全部解析</button>
        </div>
    </div>

    <script>
        // ==================== GLOBAL STATE ====================
        let allData = null;
        let currentModuleId = 'M1';
        let currentMode = 'practice';
        let userAnswers = {};  // { questionId: 'user answer' }
        let stepStates = {};   // { partIndex: currentStepIndex }

        // ==================== INIT ====================
        async function init() {
            try {
                const response = await fetch('english.json');
                allData = await response.json();
                populateModuleSelector();
                const params = new URLSearchParams(window.location.search);
                const dayParam = params.get('day');
                if (dayParam) {
                    const moduleId = dayToModule(dayParam);
                    if (moduleId) currentModuleId = moduleId;
                }
                const moduleParam = params.get('module');
                if (moduleParam) currentModuleId = moduleParam;
                document.getElementById('moduleSelect').value = currentModuleId;
                renderModule(currentModuleId);
            } catch (e) {
                document.getElementById('contentArea').innerHTML =
                    '<div class="question-card" style="text-align:center;padding:2rem;">⚠️ 题库数据加载失败，请检查 english.json 文件是否在同一目录下。<br><small>错误信息：' + e.message + '</small></div>';
                document.getElementById('moduleSelect').innerHTML = '<option value="">加载失败</option>';
            }
        }

        function dayToModule(day) {
            const map = {
                '1': 'M1', '2': 'M3', '3': 'M4', '4': 'M5',
                '5': 'M1', '6': 'M6', '7': 'M8', '8': 'M9', '9': 'M10', '10': 'M11'
            };
            return map[day] || null;
        }

        function populateModuleSelector() {
            const select = document.getElementById('moduleSelect');
            select.innerHTML = '';
            allData.modules.forEach(mod => {
                const option = document.createElement('option');
                option.value = mod.id;
                option.textContent = mod.id + ' - ' + mod.title;
                select.appendChild(option);
            });
            select.value = currentModuleId;
        }

        function switchModule() {
            currentModuleId = document.getElementById('moduleSelect').value;
            resetAll();
            renderModule(currentModuleId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== RENDER ====================
        function renderModule(moduleId) {
            const mod = allData.modules.find(m => m.id === moduleId);
            if (!mod) return;

            document.getElementById('headerTitle').textContent = mod.id + ' - ' + mod.title;

            const knowCard = document.getElementById('knowledgeCard');
            if (mod.knowledge) {
                knowCard.style.display = 'block';
                knowCard.innerHTML = '<strong>📌 知识点速记：</strong>' + mod.knowledge;
            } else {
                knowCard.style.display = 'none';
            }

            let html = '';
            let partIndex = 0;
            mod.parts.forEach((part, pIdx) => {
                html += '<div class="part-section" id="part-' + pIdx + '">';
                html += '<div class="part-title">📋 ' + part.type + '</div>';
                if (part.instructions) {
                    html += '<div class="part-instructions">' + part.instructions + '</div>';
                }

                if (part.type === '完形填空' || part.type === '阅读理解') {
                    // Step-by-step mode
                    html += renderClozeReadingStep(part, pIdx);
                } else if (part.type === '写作模板') {
                    if (part.templates) {
                        part.templates.forEach((tpl, tIdx) => {
                            html += renderTemplate(tpl, tIdx);
                        });
                    }
                } else {
                    // Standard mode (语法选择、短文填空、回答问题)
                    if (part.passage) {
                        html += '<div class="passage-box" style="background:#fafcfe;border:2px dashed #d0e4f5;border-radius:12px;padding:1rem;margin-bottom:1rem;font-size:0.9rem;line-height:2;">' + part.passage + '</div>';
                    }
                    if (part.questions) {
                        part.questions.forEach((q, qIdx) => {
                            html += renderStandardQuestion(q, part.type, pIdx, qIdx);
                        });
                    }
                }
                html += '</div>';
                partIndex++;
            });

            document.getElementById('contentArea').innerHTML = html;

            // Initialize step states for cloze/reading parts
            stepStates = {};
            mod.parts.forEach((part, pIdx) => {
                if (part.type === '完形填空' || part.type === '阅读理解') {
                    stepStates[pIdx] = 0;
                    updateStepDisplay(pIdx);
                }
            });

            const hasQuestions = mod.parts.some(p => p.questions && p.questions.length > 0);
            document.getElementById('actionBtns').style.display = hasQuestions ? 'flex' : 'none';

            userAnswers = {};
            updateScoreBar();
            document.getElementById('scoreBar').classList.remove('show');

            if (currentMode === 'review') {
                revealAllAnswers();
            }
        }

        // ==================== CLOZE / READING STEP MODE ====================
        function renderClozeReadingStep(part, pIdx) {
            const questions = part.questions || [];
            const totalSteps = questions.length;
            const partId = 'step-part-' + pIdx;

            let html = '<div class="step-container" id="' + partId + '">';

            // Passage area
            html += '<div class="passage-area" id="passage-' + pIdx + '">';
            html += generatePassageWithBlanks(part, pIdx, questions);
            html += '</div>';

            // Step question area
            html += '<div class="step-question-area" id="step-area-' + pIdx + '">';
            html += '<div class="step-progress">';
            html += '<span>📌 第 <strong id="step-cur-' + pIdx + '">1</strong> / ' + totalSteps + ' 题</span>';
            html += '<div class="progress-bar-outer"><div class="progress-bar-inner" id="step-bar-' + pIdx + '" style="width:0%"></div></div>';
            html += '</div>';
            html += '<div id="step-stem-' + pIdx + '" class="step-stem"></div>';
            html += '<ul class="step-options" id="step-options-' + pIdx + '"></ul>';
            html += '<div class="step-analysis" id="step-analysis-' + pIdx + '"></div>';
            html += '<div class="step-nav">';
            html += '<button class="step-nav-btn" id="step-prev-' + pIdx + '" onclick="stepNav(' + pIdx + ', -1)">◀ 上一题</button>';
            html += '<button class="step-nav-btn primary-nav" id="step-next-' + pIdx + '" onclick="stepNav(' + pIdx + ', 1)">下一题 ▶</button>';
            html += '</div>';
            html += '</div>';

            html += '</div>';
            return html;
        }

        function generatePassageWithBlanks(part, pIdx, questions) {
            let passage = part.passage || '';
            // Replace ___1___, ___2___ etc with clickable spans
            passage = passage.replace(/___(\d+)___/g, function(match, num) {
                const qIdx = parseInt(num) - 1;
                const qId = questions[qIdx] ? questions[qIdx].id : ('q' + num);
                return '<span class="cloze-blank" id="blank-' + pIdx + '-' + qIdx + '" data-qidx="' + qIdx + '" onclick="jumpToStep(' + pIdx + ', ' + qIdx + ')">[' + num + ']</span>';
            });
            return passage;
        }

        function updateStepDisplay(pIdx) {
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (!mod) return;
            const part = mod.parts[pIdx];
            if (!part || !part.questions) return;

            const questions = part.questions;
            const currentStep = stepStates[pIdx] || 0;
            const totalSteps = questions.length;
            const q = questions[currentStep];
            if (!q) return;

            // Update progress
            const curEl = document.getElementById('step-cur-' + pIdx);
            const barEl = document.getElementById('step-bar-' + pIdx);
            if (curEl) curEl.textContent = currentStep + 1;
            if (barEl) barEl.style.width = ((currentStep + 1) / totalSteps * 100) + '%';

            // Update stem
            const stemEl = document.getElementById('step-stem-' + pIdx);
            if (stemEl) stemEl.innerHTML = '<strong>' + (q.stem || ('第 ' + (currentStep + 1) + ' 空')) + '</strong>';

            // Update options
            const optionsEl = document.getElementById('step-options-' + pIdx);
            if (optionsEl && q.options) {
                optionsEl.innerHTML = '';
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'step-option-btn';
                    btn.textContent = opt.label + '. ' + opt.text;
                    btn.setAttribute('data-value', opt.label);
                    btn.onclick = function() { selectStepOption(pIdx, currentStep, opt.label, this); };
                    // Restore previous selection
                    const qId = q.id;
                    if (userAnswers[qId] === opt.label) {
                        btn.classList.add('selected');
                    }
                    // If review mode, show correct/wrong
                    if (currentMode === 'review') {
                        if (opt.label === q.answer) btn.classList.add('correct-show');
                        if (userAnswers[qId] === opt.label && opt.label !== q.answer) btn.classList.add('wrong-show');
                    }
                    optionsEl.appendChild(btn);
                });
            }

            // Update analysis
            const analysisEl = document.getElementById('step-analysis-' + pIdx);
            if (analysisEl && q.analysis) {
                analysisEl.innerHTML = '<span class="tip-icon">💡</span>' + q.analysis;
                const qId = q.id;
                if (currentMode === 'review' || (userAnswers[qId] && userAnswers[qId] !== '')) {
                    analysisEl.classList.add('show');
                } else {
                    analysisEl.classList.remove('show');
                }
            }

            // Update navigation buttons
            const prevBtn = document.getElementById('step-prev-' + pIdx);
            const nextBtn = document.getElementById('step-next-' + pIdx);
            if (prevBtn) prevBtn.disabled = (currentStep === 0);
            if (nextBtn) {
                if (currentStep >= totalSteps - 1) {
                    nextBtn.textContent = '✅ 完成';
                } else {
                    nextBtn.textContent = '下一题 ▶';
                }
            }

            // Update passage blanks highlighting
            updateBlankHighlighting(pIdx, currentStep, questions);

            // Scroll step area into view on mobile
            const stepArea = document.getElementById('step-area-' + pIdx);
            if (stepArea && window.innerWidth < 600) {
                setTimeout(() => {
                    stepArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }

        function updateBlankHighlighting(pIdx, currentStep, questions) {
            // Remove all highlights
            const passageEl = document.getElementById('passage-' + pIdx);
            if (!passageEl) return;
            const blanks = passageEl.querySelectorAll('.cloze-blank');
            blanks.forEach(blank => {
                blank.classList.remove('current', 'answered', 'wrong-mark');
            });

            // Highlight current
            const currentBlank = document.getElementById('blank-' + pIdx + '-' + currentStep);
            if (currentBlank) {
                currentBlank.classList.add('current');
            }

            // Mark answered blanks
            questions.forEach((q, qIdx) => {
                const blank = document.getElementById('blank-' + pIdx + '-' + qIdx);
                if (!blank) return;
                const ans = userAnswers[q.id];
                if (ans && ans !== '') {
                    if (currentMode === 'review' || ans.toLowerCase() === q.answer.toLowerCase()) {
                        blank.classList.add('answered');
                        blank.textContent = ans;
                    } else {
                        blank.classList.add('wrong-mark');
                        blank.textContent = ans;
                    }
                } else {
                    blank.textContent = '[' + (qIdx + 1) + ']';
                }
            });
        }

        function selectStepOption(pIdx, stepIdx, value, btnElement) {
            if (currentMode === 'review') return;

            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (!mod) return;
            const q = mod.parts[pIdx].questions[stepIdx];
            if (!q) return;

            const qId = q.id;
            userAnswers[qId] = value;

            // Clear previous selection in this step
            const optionsEl = document.getElementById('step-options-' + pIdx);
            if (optionsEl) {
                optionsEl.querySelectorAll('.step-option-btn').forEach(b => b.classList.remove('selected'));
            }
            btnElement.classList.add('selected');

            // Auto-check
            checkStepQuestion(pIdx, stepIdx, q);

            // Update blank
            updateBlankHighlighting(pIdx, stepIdx, mod.parts[pIdx].questions);
            updateScoreBar();
        }

        function checkStepQuestion(pIdx, stepIdx, q) {
            const userAnswer = userAnswers[q.id];
            if (!userAnswer) return;

            const isCorrect = (userAnswer.toLowerCase() === q.answer.toLowerCase());
            const analysisEl = document.getElementById('step-analysis-' + pIdx);
            if (analysisEl) analysisEl.classList.add('show');

            // Highlight options
            const optionsEl = document.getElementById('step-options-' + pIdx);
            if (optionsEl) {
                optionsEl.querySelectorAll('.step-option-btn').forEach(btn => {
                    const val = btn.getAttribute('data-value');
                    if (val === q.answer) btn.classList.add('correct-show');
                    if (val === userAnswer && !isCorrect) btn.classList.add('wrong-show');
                });
            }

            updateBlankHighlighting(pIdx, stepIdx, allData.modules.find(m => m.id === currentModuleId).parts[pIdx].questions);
        }

        function stepNav(pIdx, direction) {
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (!mod) return;
            const questions = mod.parts[pIdx].questions;
            const currentStep = stepStates[pIdx] || 0;
            const newStep = currentStep + direction;

            if (newStep < 0 || newStep >= questions.length) {
                // If clicking "完成" on last step
                if (direction > 0 && currentStep >= questions.length - 1) {
                    updateScoreBar();
                    document.getElementById('scoreBar').classList.add('show');
                    document.getElementById('scoreBar').scrollIntoView({ behavior: 'smooth' });
                }
                return;
            }

            stepStates[pIdx] = newStep;
            updateStepDisplay(pIdx);

            // Scroll to top of step container
            const container = document.getElementById('step-part-' + pIdx);
            if (container && window.innerWidth < 600) {
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function jumpToStep(pIdx, stepIdx) {
            stepStates[pIdx] = stepIdx;
            updateStepDisplay(pIdx);
            const stepArea = document.getElementById('step-area-' + pIdx);
            if (stepArea) stepArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // ==================== STANDARD QUESTION RENDER ====================
        function renderStandardQuestion(q, type, pIdx, qIdx) {
            const qId = q.id || (pIdx + '_' + qIdx);
            let html = '<div class="question-card" id="card-' + qId + '">';
            html += '<span class="question-num">' + ((qIdx || 0) + 1) + '</span>';
            html += '<span class="question-stem">' + q.stem + '</span>';

            if (type === '语法选择') {
                html += '<ul class="options-list">';
                q.options.forEach(opt => {
                    html += '<li><button class="option-item" data-qid="' + qId + '" data-value="' + opt.label + '" onclick="selectStandardOption(this, \'' + qId + '\', \'' + opt.label + '\')">' + opt.label + '. ' + opt.text + '</button></li>';
                });
                html += '</ul>';
            } else if (type === '短文填空' || type === '回答问题') {
                const placeholder = type === '回答问题' ? '请输入你的答案...' : '请输入答案...';
                html += '<input type="text" class="fill-input" id="fill-' + qId + '" data-qid="' + qId + '" placeholder="' + placeholder + '" onchange="fillStandardAnswer(this, \'' + qId + '\', \'' + type + '\')">';
                if (type === '回答问题') {
                    html += '<button class="btn btn-outline" style="margin-left:0.5rem;padding:0.4rem 0.8rem;font-size:0.8rem;" onclick="toggleReference(\'ref-' + qId + '\')">📖 查看参考答案</button>';
                    html += '<div class="reference-answer" id="ref-' + qId + '">';
                    html += '<strong>✅ 参考答案：</strong>' + (q.referenceAnswer || '暂无');
                    html += '<div class="scoring-points"><strong>🎯 踩分点：</strong>' + (q.scoringPoints || '暂无') + '</div>';
                    html += '</div>';
                }
            }

            if (q.analysis) {
                html += '<div class="analysis-box" id="analysis-' + qId + '">';
                html += '<span class="tip-icon">💡</span>' + q.analysis;
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        function selectStandardOption(btn, qId, value) {
            if (currentMode === 'review') return;
            const card = document.getElementById('card-' + qId);
            card.querySelectorAll('.option-item').forEach(b => {
                b.classList.remove('selected', 'correct-answer', 'wrong-answer');
            });
            btn.classList.add('selected');
            userAnswers[qId] = value;
            checkStandardQuestion(qId);
        }

        function fillStandardAnswer(input, qId, type) {
            if (currentMode === 'review') return;
            userAnswers[qId] = input.value.trim();
            if (type !== '回答问题') {
                checkStandardQuestion(qId);
            }
        }

        function checkStandardQuestion(qId) {
            const q = findQuestionById(qId);
            if (!q) return;
            const userAnswer = userAnswers[qId];
            if (userAnswer === undefined || userAnswer === '') return;

            const card = document.getElementById('card-' + qId);
            const analysisBox = document.getElementById('analysis-' + qId);
            const isCorrect = (userAnswer.toLowerCase() === q.answer.toLowerCase());

            card.classList.remove('correct', 'wrong');
            card.classList.add(isCorrect ? 'correct' : 'wrong');
            if (analysisBox) analysisBox.classList.add('show');

            const optionBtns = card.querySelectorAll('.option-item');
            optionBtns.forEach(btn => {
                const btnValue = btn.getAttribute('data-value');
                if (btnValue === q.answer) btn.classList.add('correct-answer');
                if (btnValue === userAnswer && !isCorrect) btn.classList.add('wrong-answer');
            });

            const fillInput = card.querySelector('.fill-input');
            if (fillInput) {
                fillInput.classList.remove('correct-fill', 'wrong-fill');
                fillInput.classList.add(isCorrect ? 'correct-fill' : 'wrong-fill');
            }

            updateScoreBar();
        }

        function renderTemplate(tpl, tIdx) {
            let html = '<div class="template-card">';
            html += '<h3>📝 ' + tpl.title + '</h3>';
            html += '<div class="template-suitable">📌 适用：' + tpl.suitable + '</div>';
            html += '<div class="template-structure">' + tpl.structure + '</div>';
            if (tpl.example) {
                html += '<div class="template-example">' + tpl.example + '</div>';
            }
            html += '</div>';
            return html;
        }

        // ==================== COMMON ====================
        function findQuestionById(qId) {
            if (!allData) return null;
            for (const mod of allData.modules) {
                for (const part of mod.parts) {
                    if (part.questions) {
                        for (const q of part.questions) {
                            if (q.id === qId) return q;
                        }
                    }
                }
            }
            return null;
        }

        function checkAll() {
            document.querySelectorAll('.question-card').forEach(card => {
                const qId = card.id.replace('card-', '');
                if (userAnswers[qId] !== undefined && userAnswers[qId] !== '') {
                    checkStandardQuestion(qId);
                }
            });
            // Also check cloze/reading steps
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (mod) {
                mod.parts.forEach((part, pIdx) => {
                    if ((part.type === '完形填空' || part.type === '阅读理解') && part.questions) {
                        part.questions.forEach((q, qIdx) => {
                            if (userAnswers[q.id] !== undefined && userAnswers[q.id] !== '') {
                                checkStepQuestion(pIdx, qIdx, q);
                            }
                        });
                        updateStepDisplay(pIdx);
                    }
                });
            }
            updateScoreBar();
            document.getElementById('scoreBar').classList.add('show');
            document.getElementById('scoreBar').scrollIntoView({ behavior: 'smooth' });
        }

        function resetAll() {
            userAnswers = {};
            stepStates = {};
            document.querySelectorAll('.question-card').forEach(card => {
                card.classList.remove('correct', 'wrong');
            });
            document.querySelectorAll('.option-item').forEach(btn => {
                btn.classList.remove('selected', 'correct-answer', 'wrong-answer');
            });
            document.querySelectorAll('.fill-input').forEach(input => {
                input.value = '';
                input.classList.remove('correct-fill', 'wrong-fill');
            });
            document.querySelectorAll('.analysis-box').forEach(box => {
                box.classList.remove('show');
            });
            document.querySelectorAll('.reference-answer').forEach(ref => {
                ref.classList.remove('show');
            });
            document.querySelectorAll('.step-analysis').forEach(box => {
                box.classList.remove('show');
            });
            document.querySelectorAll('.step-option-btn').forEach(btn => {
                btn.classList.remove('selected', 'correct-show', 'wrong-show');
            });
            // Reset step states
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (mod) {
                mod.parts.forEach((part, pIdx) => {
                    if (part.type === '完形填空' || part.type === '阅读理解') {
                        stepStates[pIdx] = 0;
                        updateStepDisplay(pIdx);
                    }
                });
            }
            document.getElementById('scoreBar').classList.remove('show');
        }

        function showAllAnalysis() {
            document.querySelectorAll('.analysis-box').forEach(box => box.classList.add('show'));
            document.querySelectorAll('.step-analysis').forEach(box => box.classList.add('show'));
        }

        function revealAllAnswers() {
            document.querySelectorAll('.analysis-box').forEach(box => box.classList.add('show'));
            document.querySelectorAll('.reference-answer').forEach(ref => ref.classList.add('show'));
            document.querySelectorAll('.step-analysis').forEach(box => box.classList.add('show'));

            document.querySelectorAll('.question-card').forEach(card => {
                const qId = card.id.replace('card-', '');
                const q = findQuestionById(qId);
                if (!q) return;
                card.querySelectorAll('.option-item').forEach(btn => {
                    if (btn.getAttribute('data-value') === q.answer) btn.classList.add('correct-answer');
                });
                const fillInput = card.querySelector('.fill-input');
                if (fillInput && q.answer) {
                    fillInput.value = q.answer;
                    fillInput.classList.add('correct-fill');
                }
            });

            // Reveal cloze/reading
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (mod) {
                mod.parts.forEach((part, pIdx) => {
                    if ((part.type === '完形填空' || part.type === '阅读理解') && part.questions) {
                        part.questions.forEach((q, qIdx) => {
                            if (!userAnswers[q.id] || userAnswers[q.id] === '') {
                                userAnswers[q.id] = q.answer;
                            }
                        });
                        updateStepDisplay(pIdx);
                        const analysisEl = document.getElementById('step-analysis-' + pIdx);
                        if (analysisEl) analysisEl.classList.add('show');
                    }
                });
            }
        }

        function toggleReference(refId) {
            const ref = document.getElementById(refId);
            if (ref) ref.classList.toggle('show');
        }

        function updateScoreBar() {
            let total = 0;
            let correct = 0;
            Object.keys(userAnswers).forEach(qId => {
                const q = findQuestionById(qId);
                if (!q) return;
                if (userAnswers[qId] !== undefined && userAnswers[qId] !== '') {
                    total++;
                    if (userAnswers[qId].toLowerCase() === q.answer.toLowerCase()) correct++;
                }
            });
            document.getElementById('scoreNum').textContent = correct + '/' + total;
            const pct = total > 0 ? Math.round(correct / total * 100) : 0;
            let msg = '';
            if (total === 0) msg = '请开始答题';
            else if (pct >= 90) msg = '🌟 优秀！你的基础非常扎实！';
            else if (pct >= 70) msg = '👍 良好！继续加油！';
            else if (pct >= 50) msg = '📖 还需努力，注意复习错题。';
            else msg = '💪 别灰心，错题是最好的老师！';
            document.getElementById('scoreText').textContent = msg;
            if (total > 0) document.getElementById('scoreBar').classList.add('show');
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.mode-btn[data-mode="' + mode + '"]').classList.add('active');
            resetAll();
            if (mode === 'review') {
                revealAllAnswers();
            }
        }

        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
