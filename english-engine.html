<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>英语题库 - 广东中考专项训练</title>
    <style>
        :root {
            --bg: #f3f8fc;
            --card: #ffffff;
            --border: #d0e4f5;
            --accent: #5b9bd5;
            --accent-dark: #3d7ab8;
            --correct: #27ae60;
            --wrong: #e74c3c;
            --keyword: #e74c3c;
            --shadow: 0 2px 12px rgba(60,100,160,0.07);
            --radius: 14px;
            --font-main: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;
            --font-serif: 'Noto Serif SC','STSong','SimSun','KaiTi',serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-main);
            background: linear-gradient(180deg, #eef5fb 0%, #e3eff9 30%, #f5f9fd 100%);
            min-height: 100vh;
            color: #2c3e50;
            line-height: 1.7;
            -webkit-tap-highlight-color: transparent;
        }
        .app-header {
            background: linear-gradient(135deg, #5b9bd5 0%, #4a8bc2 40%, #3d7ab8 100%);
            color: #fff;
            padding: 1rem 1rem;
            text-align: center;
            box-shadow: 0 3px 16px rgba(60,100,160,0.2);
            border-radius: 0 0 16px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header .back-btn {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 0.35rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .app-header .back-btn:hover { background: rgba(255,255,255,0.35); }
        .app-header h1 {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: 700;
            margin: 0;
        }
        .app-header .subtitle {
            font-size: 0.75rem;
            opacity: 0.9;
            margin-top: 2px;
        }
        .main-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 0.8rem 0.8rem 2rem;
        }
        .module-selector {
            background: #fff;
            border-radius: var(--radius);
            padding: 0.7rem 0.9rem;
            margin-bottom: 0.8rem;
            border: 2px solid #d0e4f5;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .module-selector label {
            font-weight: 700;
            font-size: 0.85rem;
            color: #3d7ab8;
            white-space: nowrap;
        }
        .module-selector select {
            flex: 1;
            min-width: 160px;
            padding: 0.5rem 0.7rem;
            border: 2px solid #d0e4f5;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: var(--font-main);
            color: #2c3e50;
            background: #fafcfe;
            cursor: pointer;
        }
        .module-selector select:focus {
            outline: none;
            border-color: #5b9bd5;
            box-shadow: 0 0 0 3px rgba(91,155,213,0.1);
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 0.7rem;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 0.45rem 0.8rem;
            border: 2px solid #d0e4f5;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-main);
            color: #5b9bd5;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            position: relative;
        }
        .mode-btn.active {
            background: #5b9bd5;
            color: #fff;
            border-color: #5b9bd5;
        }
        .mode-btn:hover { border-color: #5b9bd5; }
        .mode-btn .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e74c3c;
            color: #fff;
            font-size: 0.6rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Knowledge Card */
        .knowledge-card {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cd 100%);
            border: 2px solid #f0d87e;
            border-radius: var(--radius);
            padding: 0.8rem 0.9rem;
            margin-bottom: 0.8rem;
            font-size: 0.82rem;
            color: #7a6500;
            line-height: 1.6;
        }
        .knowledge-card strong { color: #c79100; }

        /* Part Section */
        .part-section { margin-bottom: 1.2rem; }
        .part-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #3d7ab8;
            margin-bottom: 0.5rem;
            padding: 0.45rem 0.7rem;
            background: #e8f2fa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .part-instructions {
            font-size: 0.78rem;
            color: #6a9ab8;
            margin-bottom: 0.6rem;
            padding-left: 0.2rem;
        }

        /* Step Container (Cloze & Reading) */
        .step-container {
            background: #fff;
            border-radius: var(--radius);
            border: 2px solid #d0e4f5;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 0.8rem;
        }
        .passage-area {
            padding: 0.9rem 1rem;
            border-bottom: 2px solid #e8f2fa;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 2;
            background: #fdfeff;
        }
        .passage-area .cloze-blank {
            display: inline-block;
            min-width: 55px;
            padding: 0.05rem 0.5rem;
            margin: 0 2px;
            border-radius: 6px;
            text-align: center;
            font-weight: 700;
            font-size: 0.82rem;
            transition: all 0.3s;
            background: #e8f2fa;
            color: #5b9bd5;
            border-bottom: 2px dashed #5b9bd5;
            cursor: pointer;
        }
        .passage-area .cloze-blank.current {
            background: #fff3cd;
            color: #c79100;
            border-bottom: 3px solid #f0c040;
            animation: pulse 1.2s ease-in-out infinite;
            box-shadow: 0 0 8px rgba(240,192,64,0.4);
        }
        .passage-area .cloze-blank.answered {
            background: #d4efdf;
            color: #1a6e3e;
            border-bottom: 2px solid #27ae60;
        }
        .passage-area .cloze-blank.wrong-mark {
            background: #fde0dc;
            color: #a82020;
            border-bottom: 2px solid #e74c3c;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 4px rgba(240,192,64,0.3); }
            50% { box-shadow: 0 0 14px rgba(240,192,64,0.7); }
        }
        .step-question-area {
            padding: 0.9rem 1rem;
            min-height: 140px;
        }
        .step-progress {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.6rem;
            font-size: 0.78rem;
            color: #6a9ab8;
            font-weight: 600;
        }
        .step-progress .progress-bar-outer {
            flex: 1;
            height: 5px;
            background: #e8f2fa;
            border-radius: 3px;
            overflow: hidden;
        }
        .step-progress .progress-bar-inner {
            height: 100%;
            background: #5b9bd5;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .step-stem {
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
            line-height: 1.7;
            padding: 0.4rem 0.6rem;
            background: #fafcfe;
            border-radius: 8px;
            border-left: 3px solid #5b9bd5;
        }
        .step-options { list-style: none; padding: 0; margin-bottom: 0.6rem; }
        .step-option-btn {
            display: block;
            width: 100%;
            padding: 0.6rem 0.9rem;
            margin-bottom: 0.35rem;
            border: 2px solid #e8f2fa;
            border-radius: 10px;
            background: #fafcfe;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: left;
            font-family: var(--font-main);
            transition: all 0.2s;
            color: #2c3e50;
        }
        .step-option-btn:hover { border-color: #5b9bd5; background: #f0f7fd; }
        .step-option-btn.selected { border-color: #5b9bd5; background: #e3f0fb; font-weight: 600; }
        .step-option-btn.correct-show { border-color: var(--correct); background: #d4efdf; color: #1a6e3e; font-weight: 700; }
        .step-option-btn.wrong-show { border-color: var(--wrong); background: #fde0dc; color: #a82020; }
        .step-nav {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            justify-content: center;
        }
        .step-nav-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #d0e4f5;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: var(--font-main);
            font-weight: 600;
            color: #5b9bd5;
            transition: all 0.2s;
        }
        .step-nav-btn:hover { border-color: #5b9bd5; background: #f0f7fd; }
        .step-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .step-nav-btn.primary-nav { background: #5b9bd5; color: #fff; border-color: #5b9bd5; }
        .step-analysis {
            margin-top: 0.5rem;
            padding: 0.6rem 0.8rem;
            background: #fdf6e3;
            border-left: 4px solid #f0c040;
            border-radius: 0 10px 10px 0;
            font-size: 0.82rem;
            line-height: 1.7;
            display: none;
        }
        .step-analysis.show { display: block; }

        /* Standard Question Card */
        .question-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 1rem 0.9rem;
            margin-bottom: 0.7rem;
            border: 2px solid #d0e4f5;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            position: relative;
        }
        .question-card.correct { border-color: var(--correct); background: #f0faf5; }
        .question-card.wrong { border-color: var(--wrong); background: #fef5f5; }
        .question-num {
            display: inline-block;
            background: #5b9bd5;
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            text-align: center;
            line-height: 26px;
            font-size: 0.78rem;
            font-weight: 700;
            margin-right: 0.4rem;
        }
        .question-stem {
            font-size: 0.9rem;
            margin-bottom: 0.7rem;
            line-height: 1.8;
            display: inline;
        }
        .keyword, .passage-area .keyword, .step-stem .keyword, .question-stem .keyword {
            color: #e74c3c !important;
            font-weight: 700 !important;
            background: #fff5f5;
            padding: 0.08rem 0.25rem;
            border-radius: 4px;
            border-bottom: 2px solid #e74c3c;
        }
        .wrongbook-btn {
            position: absolute;
            top: 0.6rem;
            right: 0.7rem;
            background: none;
            border: 1px solid #d0e4f5;
            border-radius: 15px;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            cursor: pointer;
            color: #8aabc8;
            transition: all 0.2s;
        }
        .wrongbook-btn:hover { color: #e74c3c; border-color: #e74c3c; }
        .wrongbook-btn.saved { color: #e74c3c; border-color: #e74c3c; background: #fff5f5; }
        .options-list { list-style: none; padding: 0; }
        .option-item {
            display: block;
            width: 100%;
            padding: 0.6rem 0.9rem;
            margin-bottom: 0.35rem;
            border: 2px solid #e8f2fa;
            border-radius: 10px;
            background: #fafcfe;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: left;
            font-family: var(--font-main);
            transition: all 0.2s;
            color: #2c3e50;
        }
        .option-item:hover { border-color: #5b9bd5; background: #f0f7fd; }
        .option-item.selected { border-color: #5b9bd5; background: #e3f0fb; font-weight: 600; }
        .option-item.correct-answer { border-color: var(--correct); background: #d4efdf; color: #1a6e3e; font-weight: 700; }
        .option-item.wrong-answer { border-color: var(--wrong); background: #fde0dc; color: #a82020; }
        .fill-input {
            width: 100%;
            max-width: 250px;
            padding: 0.55rem 0.9rem;
            border: 2px solid #d0e4f5;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: var(--font-main);
            transition: all 0.2s;
            background: #fafcfe;
        }
        .fill-input:focus { outline: none; border-color: #5b9bd5; box-shadow: 0 0 0 3px rgba(91,155,213,0.1); }
        .fill-input.correct-fill { border-color: var(--correct); background: #f0faf5; }
        .fill-input.wrong-fill { border-color: var(--wrong); background: #fef5f5; }
        .analysis-box {
            margin-top: 0.7rem;
            padding: 0.7rem 0.9rem;
            background: #fdf6e3;
            border-left: 4px solid #f0c040;
            border-radius: 0 10px 10px 0;
            font-size: 0.82rem;
            line-height: 1.7;
            display: none;
        }
        .analysis-box.show { display: block; }

        /* Score Bar */
        .score-bar {
            background: #fff;
            border-radius: var(--radius);
            padding: 0.9rem;
            margin-bottom: 0.8rem;
            border: 2px solid #d0e4f5;
            box-shadow: var(--shadow);
            text-align: center;
            display: none;
        }
        .score-bar.show { display: block; }
        .score-num { font-size: 1.8rem; font-weight: 700; color: #5b9bd5; }
        .score-text { font-size: 0.82rem; color: #6a9ab8; }

        /* Template Card */
        .template-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 1rem 0.9rem;
            margin-bottom: 0.8rem;
            border: 2px solid #f0d87e;
            box-shadow: var(--shadow);
        }
        .template-card h3 { color: #c79100; margin-bottom: 0.4rem; font-size: 1rem; }
        .template-suitable {
            font-size: 0.76rem;
            color: #8a7a30;
            margin-bottom: 0.6rem;
            padding: 0.25rem 0.5rem;
            background: #fff9e6;
            border-radius: 8px;
            display: inline-block;
        }
        .template-structure {
            font-size: 0.84rem;
            line-height: 1.9;
            padding: 0.7rem;
            background: #fafcfe;
            border-radius: 10px;
            border: 1px solid #e8f2fa;
        }
        .template-example {
            margin-top: 0.6rem;
            padding: 0.7rem;
            background: #f0faf5;
            border-radius: 10px;
            border: 1px solid #d4efdf;
            font-size: 0.82rem;
            line-height: 1.8;
        }
        .template-structure table { font-size: 0.82rem; width: 100%; border-collapse: collapse; }
        .template-structure th { background: #e8f2fa; padding: 6px 8px; border: 1px solid #d0e4f5; color: #3d7ab8; }
        .template-structure td { padding: 6px 8px; border: 1px solid #d0e4f5; }
        .reference-answer {
            background: #f0faf5;
            border: 1px solid #d4efdf;
            border-radius: 8px;
            padding: 0.5rem 0.7rem;
            margin-top: 0.4rem;
            font-size: 0.82rem;
            display: none;
        }
        .reference-answer.show { display: block; }
        .scoring-points {
            background: #fff9e6;
            border: 1px solid #f0d87e;
            border-radius: 8px;
            padding: 0.4rem 0.7rem;
            margin-top: 0.3rem;
            font-size: 0.78rem;
            color: #7a6500;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 0.6rem 1.3rem;
            border: none;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-primary { background: #5b9bd5; color: #fff; }
        .btn-primary:hover { background: #4a8bc2; transform: translateY(-1px); }
        .btn-outline { background: #fff; color: #5b9bd5; border: 2px solid #5b9bd5; }
        .btn-outline:hover { background: #f0f7fd; }
        .btn-check { background: #27ae60; color: #fff; }
        .btn-check:hover { background: #219a52; }

        /* Wrongbook empty */
        .wrongbook-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #8aabc8;
        }
        .wrongbook-empty .empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }

        @media (max-width: 480px) {
            .app-header h1 { font-size: 1.05rem; }
            .app-header .back-btn { padding: 0.3rem 0.55rem; font-size: 0.75rem; left: 0.4rem; }
            .question-card { padding: 0.9rem 0.7rem; }
            .option-item { padding: 0.55rem 0.7rem; font-size: 0.82rem; }
            .step-option-btn { padding: 0.55rem 0.7rem; font-size: 0.82rem; }
            .module-selector { padding: 0.6rem 0.7rem; }
            .mode-btn { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
            .passage-area { max-height: 160px; font-size: 0.8rem; padding: 0.7rem; }
            .step-question-area { padding: 0.7rem; }
            .step-nav-btn { padding: 0.4rem 0.7rem; font-size: 0.78rem; }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <h1>📝 英语题库</h1>
        <div class="subtitle" id="headerTitle">广东中考 · 专项突破</div>
    </div>

    <div class="main-content">
        <!-- Module Selector -->
        <div class="module-selector">
            <label for="moduleSelect">📂 模块：</label>
            <select id="moduleSelect" onchange="switchModule()">
                <option value="">加载中...</option>
            </select>
        </div>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="practice" onclick="setMode('practice')">📝 练习</button>
            <button class="mode-btn" data-mode="review" onclick="setMode('review')">👀 浏览</button>
            <button class="mode-btn" data-mode="wrongbook" onclick="setMode('wrongbook')" id="wrongbookBtn">📕 错题本<span class="badge" id="wrongbookBadge" style="display:none;">0</span></button>
        </div>

        <!-- Knowledge Card -->
        <div class="knowledge-card" id="knowledgeCard" style="display:none;"></div>

        <!-- Score Bar -->
        <div class="score-bar" id="scoreBar">
            <div class="score-num" id="scoreNum">0/0</div>
            <div class="score-text" id="scoreText">完成题目即可查看得分</div>
        </div>

        <!-- Content Area -->
        <div id="contentArea"></div>

        <!-- Action Buttons -->
        <div class="btn-row" id="actionBtns" style="display:none;">
            <button class="btn btn-check" onclick="checkAll()">✅ 全部检查</button>
            <button class="btn btn-outline" onclick="resetAll()">🔄 全部重做</button>
            <button class="btn btn-outline" onclick="showAllAnalysis()">💡 全部解析</button>
        </div>
    </div>

    <script>
        // ==================== GLOBAL STATE ====================
        let allData = null;
        let currentModuleId = 'M1';
        let currentMode = 'practice'; // 'practice' | 'review' | 'wrongbook'
        let preWrongbookModuleId = 'M1'; // 进入错题本前的模块
        let userAnswers = {};
        let stepStates = {};
        let wrongbookData = {}; // { qId: { moduleId, moduleTitle, stem, options, correctAnswer, userAnswer, analysis, type, partType } }

        // ==================== INIT ====================
        async function init() {
            try {
                const response = await fetch('english.json');
                allData = await response.json();
                loadWrongbook();
                populateModuleSelector();
                const params = new URLSearchParams(window.location.search);
                const moduleParam = params.get('module');
                if (moduleParam) currentModuleId = moduleParam;
                const dayParam = params.get('day');
                if (dayParam) {
                    const mapped = dayToModule(dayParam);
                    if (mapped) currentModuleId = mapped;
                }
                document.getElementById('moduleSelect').value = currentModuleId;
                renderModule(currentModuleId);
                updateWrongbookBadge();
            } catch (e) {
                document.getElementById('contentArea').innerHTML =
                    '<div class="question-card" style="text-align:center;padding:2rem;">⚠️ 题库数据加载失败，请检查 english.json 文件。<br><small>' + e.message + '</small></div>';
                document.getElementById('moduleSelect').innerHTML = '<option value="">加载失败</option>';
            }
        }

        function dayToModule(day) {
            const map = { '1':'M1','2':'M3','3':'M4','4':'M5','5':'M1','6':'M6','7':'M8','8':'M9','9':'M10','10':'M11' };
            return map[day] || null;
        }

        function populateModuleSelector() {
            const select = document.getElementById('moduleSelect');
            select.innerHTML = '';
            const groups = {};
            allData.modules.forEach(mod => {
                const g = mod.group || '其他';
                if (!groups[g]) groups[g] = [];
                groups[g].push(mod);
            });
            const groupOrder = ['语法专项', '综合训练', '单词突破'];
            groupOrder.forEach(gName => {
                if (groups[gName]) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = ({'语法专项':'📘 语法专项','综合训练':'📙 综合训练','单词突破':'📒 单词突破'})[gName] || gName;
                    groups[gName].forEach(mod => {
                        const opt = document.createElement('option');
                        opt.value = mod.id;
                        opt.textContent = mod.id + ' - ' + mod.title;
                        optgroup.appendChild(opt);
                    });
                    select.appendChild(optgroup);
                }
            });
            // 其他未分组
            Object.keys(groups).forEach(gName => {
                if (!groupOrder.includes(gName)) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = gName;
                    groups[gName].forEach(mod => {
                        const opt = document.createElement('option');
                        opt.value = mod.id;
                        opt.textContent = mod.id + ' - ' + mod.title;
                        optgroup.appendChild(opt);
                    });
                    select.appendChild(optgroup);
                }
            });
            select.value = currentModuleId;
        }

        function switchModule() {
            currentModuleId = document.getElementById('moduleSelect').value;
            if (currentMode === 'wrongbook') {
                preWrongbookModuleId = currentModuleId;
                return;
            }
            resetAll();
            renderModule(currentModuleId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== WRONGBOOK ====================
        function loadWrongbook() {
            try {
                const raw = localStorage.getItem('english_wrongbook');
                wrongbookData = raw ? JSON.parse(raw) : {};
            } catch(e) { wrongbookData = {}; }
        }

        function saveWrongbook() {
            localStorage.setItem('english_wrongbook', JSON.stringify(wrongbookData));
        }

        function addToWrongbook(qId, q, moduleId, moduleTitle, type, partType, userAnswer) {
            wrongbookData[qId] = {
                qId: qId,
                moduleId: moduleId,
                moduleTitle: moduleTitle,
                stem: q.stem || '',
                options: q.options ? JSON.parse(JSON.stringify(q.options)) : null,
                correctAnswer: q.answer || q.referenceAnswer || '',
                userAnswer: userAnswer,
                analysis: q.analysis || '',
                type: type,
                partType: partType,
                timestamp: Date.now()
            };
            saveWrongbook();
            updateWrongbookBadge();
            updateWrongbookButtons();
        }

        function removeFromWrongbook(qId) {
            delete wrongbookData[qId];
            saveWrongbook();
            updateWrongbookBadge();
            updateWrongbookButtons();
            if (currentMode === 'wrongbook') {
                renderWrongbookMode();
            }
        }

        function isInWrongbook(qId) {
            return wrongbookData.hasOwnProperty(qId);
        }

        function updateWrongbookBadge() {
            const count = Object.keys(wrongbookData).length;
            const badge = document.getElementById('wrongbookBadge');
            if (count > 0) {
                badge.style.display = 'flex';
                badge.textContent = count > 99 ? '99+' : count;
            } else {
                badge.style.display = 'none';
            }
        }

        function updateWrongbookButtons() {
            document.querySelectorAll('.wrongbook-btn').forEach(btn => {
                const qId = btn.getAttribute('data-qid');
                if (isInWrongbook(qId)) {
                    btn.classList.add('saved');
                    btn.textContent = '📕 已收藏';
                } else {
                    btn.classList.remove('saved');
                    btn.textContent = '📖 加错题本';
                }
            });
        }

        function toggleWrongbook(qId, btn) {
            if (isInWrongbook(qId)) {
                removeFromWrongbook(qId);
            } else {
                const q = findQuestionById(qId);
                if (!q) return;
                const mod = allData.modules.find(m => m.parts.some(p => p.questions && p.questions.some(qq => qq.id === qId)));
                if (!mod) return;
                const part = mod.parts.find(p => p.questions && p.questions.some(qq => qq.id === qId));
                const partType = part ? part.type : '';
                const userAns = userAnswers[qId] || '';
                addToWrongbook(qId, q, mod.id, mod.title, 'standard', partType, userAns);
            }
            updateWrongbookButtons();
        }

        function renderWrongbookMode() {
            const entries = Object.values(wrongbookData).sort((a, b) => b.timestamp - a.timestamp);
            document.getElementById('headerTitle').textContent = '错题本 · 专项复习';
            document.getElementById('knowledgeCard').style.display = 'none';
            document.getElementById('actionBtns').style.display = 'none';
            document.getElementById('scoreBar').classList.remove('show');

            if (entries.length === 0) {
                document.getElementById('contentArea').innerHTML =
                    '<div class="wrongbook-empty"><span class="empty-icon">📕</span><h3>错题本为空</h3><p>做题时答错的题目会自动收集到这里。<br>也可以点击题目旁的"加错题本"手动收藏。</p></div>';
                return;
            }

            // Group by module
            const grouped = {};
            entries.forEach(e => {
                const key = e.moduleId + ' ' + e.moduleTitle;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(e);
            });

            let html = '';
            Object.keys(grouped).forEach(key => {
                html += '<div class="part-section">';
                html += '<div class="part-title">📁 ' + key + ' <span style="font-weight:400;font-size:0.8rem;">(' + grouped[key].length + '题)</span></div>';
                grouped[key].forEach((e, idx) => {
                    html += '<div class="question-card" id="card-wb-' + e.qId + '">';
                    html += '<span class="question-num">' + (idx + 1) + '</span>';
                    html += '<span class="question-stem">' + e.stem + '</span>';
                    if (e.options) {
                        html += '<ul class="options-list">';
                        e.options.forEach(opt => {
                            let cls = 'option-item';
                            if (opt.label === e.correctAnswer) cls += ' correct-answer';
                            if (opt.label === e.userAnswer && opt.label !== e.correctAnswer) cls += ' wrong-answer';
                            html += '<li><button class="' + cls + '">' + opt.label + '. ' + opt.text + '</button></li>';
                        });
                        html += '</ul>';
                    } else {
                        html += '<div style="margin:0.5rem 0;"><span style="color:#e74c3c;text-decoration:line-through;">你的答案：' + (e.userAnswer || '未作答') + '</span></div>';
                        html += '<div style="margin:0.5rem 0;color:#27ae60;font-weight:700;">✅ 正确答案：' + e.correctAnswer + '</div>';
                    }
                    if (e.analysis) {
                        html += '<div class="analysis-box show">💡 ' + e.analysis + '</div>';
                    }
                    html += '<button class="btn btn-outline" style="margin-top:0.5rem;padding:0.35rem 0.8rem;font-size:0.75rem;" onclick="removeFromWrongbook(\'' + e.qId + '\')">✅ 已掌握，移除</button>';
                    html += '</div>';
                });
                html += '</div>';
            });

            html += '<div class="btn-row"><button class="btn btn-primary" onclick="clearAllWrongbook()">🗑️ 清空错题本</button></div>';
            document.getElementById('contentArea').innerHTML = html;
        }

        function clearAllWrongbook() {
            if (confirm('确定要清空所有错题吗？此操作不可恢复。')) {
                wrongbookData = {};
                saveWrongbook();
                updateWrongbookBadge();
                updateWrongbookButtons();
                renderWrongbookMode();
            }
        }

        // ==================== RENDER ====================
        function renderModule(moduleId) {
            if (currentMode === 'wrongbook') {
                renderWrongbookMode();
                return;
            }

            const mod = allData.modules.find(m => m.id === moduleId);
            if (!mod) return;

            document.getElementById('headerTitle').textContent = mod.id + ' - ' + mod.title;

            const knowCard = document.getElementById('knowledgeCard');
            if (mod.knowledge) {
                knowCard.style.display = 'block';
                knowCard.innerHTML = '<strong>📌 知识点速记：</strong>' + mod.knowledge;
            } else {
                knowCard.style.display = 'none';
            }

            let html = '';
            mod.parts.forEach((part, pIdx) => {
                html += '<div class="part-section" id="part-' + pIdx + '">';
                html += '<div class="part-title">📋 ' + part.type + '</div>';
                if (part.instructions) {
                    html += '<div class="part-instructions">' + part.instructions + '</div>';
                }
                if (part.type === '完形填空' || part.type === '阅读理解') {
                    html += renderClozeReadingStep(part, pIdx);
                } else if (part.type === '写作模板') {
                    if (part.templates) {
                        part.templates.forEach((tpl, tIdx) => { html += renderTemplate(tpl, tIdx); });
                    }
                } else {
                    if (part.passage) {
                        html += '<div class="passage-box" style="background:#fafcfe;border:2px dashed #d0e4f5;border-radius:12px;padding:0.9rem;margin-bottom:0.7rem;font-size:0.85rem;line-height:2;">' + part.passage + '</div>';
                    }
                    if (part.questions) {
                        part.questions.forEach((q, qIdx) => {
                            html += renderStandardQuestion(q, part.type, pIdx, qIdx);
                        });
                    }
                }
                html += '</div>';
            });

            document.getElementById('contentArea').innerHTML = html;

            stepStates = {};
            mod.parts.forEach((part, pIdx) => {
                if (part.type === '完形填空' || part.type === '阅读理解') {
                    stepStates[pIdx] = 0;
                    updateStepDisplay(pIdx);
                }
            });

            const hasQuestions = mod.parts.some(p => p.questions && p.questions.length > 0);
            document.getElementById('actionBtns').style.display = hasQuestions ? 'flex' : 'none';

            userAnswers = {};
            updateScoreBar();
            document.getElementById('scoreBar').classList.remove('show');
            updateWrongbookButtons();

            if (currentMode === 'review') {
                revealAllAnswers();
            }
        }

        // ==================== CLOZE / READING STEP MODE ====================
        function renderClozeReadingStep(part, pIdx) {
            const questions = part.questions || [];
            const totalSteps = questions.length;
            let html = '<div class="step-container" id="step-part-' + pIdx + '">';
            html += '<div class="passage-area" id="passage-' + pIdx + '">';
            html += generatePassageWithBlanks(part, pIdx, questions);
            html += '</div>';
            html += '<div class="step-question-area" id="step-area-' + pIdx + '">';
            html += '<div class="step-progress">';
            html += '<span>📌 第 <strong id="step-cur-' + pIdx + '">1</strong> / ' + totalSteps + ' 题</span>';
            html += '<div class="progress-bar-outer"><div class="progress-bar-inner" id="step-bar-' + pIdx + '" style="width:0%"></div></div>';
            html += '</div>';
            html += '<div id="step-stem-' + pIdx + '" class="step-stem"></div>';
            html += '<ul class="step-options" id="step-options-' + pIdx + '"></ul>';
            html += '<div class="step-analysis" id="step-analysis-' + pIdx + '"></div>';
            html += '<div class="step-nav">';
            html += '<button class="step-nav-btn" id="step-prev-' + pIdx + '" onclick="stepNav(' + pIdx + ', -1)">◀ 上一题</button>';
            html += '<button class="step-nav-btn primary-nav" id="step-next-' + pIdx + '" onclick="stepNav(' + pIdx + ', 1)">下一题 ▶</button>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
            return html;
        }

        function generatePassageWithBlanks(part, pIdx, questions) {
            let passage = part.passage || '';
            passage = passage.replace(/___(\d+)___/g, function(match, num) {
                const qIdx = parseInt(num) - 1;
                const qId = questions[qIdx] ? questions[qIdx].id : ('q' + num);
                return '<span class="cloze-blank" id="blank-' + pIdx + '-' + qIdx + '" data-qidx="' + qIdx + '" onclick="jumpToStep(' + pIdx + ', ' + qIdx + ')">[' + num + ']</span>';
            });
            return passage;
        }

        function updateStepDisplay(pIdx) {
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (!mod) return;
            const part = mod.parts[pIdx];
            if (!part || !part.questions) return;
            const questions = part.questions;
            const currentStep = stepStates[pIdx] || 0;
            const totalSteps = questions.length;
            const q = questions[currentStep];
            if (!q) return;

            const curEl = document.getElementById('step-cur-' + pIdx);
            const barEl = document.getElementById('step-bar-' + pIdx);
            if (curEl) curEl.textContent = currentStep + 1;
            if (barEl) barEl.style.width = ((currentStep + 1) / totalSteps * 100) + '%';

            const stemEl = document.getElementById('step-stem-' + pIdx);
            if (stemEl) stemEl.innerHTML = '<strong>' + (q.stem || ('第 ' + (currentStep + 1) + ' 空')) + '</strong>';

            const optionsEl = document.getElementById('step-options-' + pIdx);
            if (optionsEl && q.options) {
                optionsEl.innerHTML = '';
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'step-option-btn';
                    btn.textContent = opt.label + '. ' + opt.text;
                    btn.setAttribute('data-value', opt.label);
                    btn.onclick = function() { selectStepOption(pIdx, currentStep, opt.label, this); };
                    const qId = q.id;
                    if (userAnswers[qId] === opt.label) btn.classList.add('selected');
                    if (currentMode === 'review') {
                        if (opt.label === q.answer) btn.classList.add('correct-show');
                        if (userAnswers[qId] === opt.label && opt.label !== q.answer) btn.classList.add('wrong-show');
                    }
                    optionsEl.appendChild(btn);
                });
            }

            const analysisEl = document.getElementById('step-analysis-' + pIdx);
            if (analysisEl && q.analysis) {
                analysisEl.innerHTML = '💡 ' + q.analysis;
                if (currentMode === 'review' || (userAnswers[q.id] && userAnswers[q.id] !== '')) {
                    analysisEl.classList.add('show');
                } else {
                    analysisEl.classList.remove('show');
                }
            }

            const prevBtn = document.getElementById('step-prev-' + pIdx);
            const nextBtn = document.getElementById('step-next-' + pIdx);
            if (prevBtn) prevBtn.disabled = (currentStep === 0);
            if (nextBtn) {
                nextBtn.textContent = currentStep >= totalSteps - 1 ? '✅ 完成' : '下一题 ▶';
            }

            updateBlankHighlighting(pIdx, currentStep, questions);

            const stepArea = document.getElementById('step-area-' + pIdx);
            if (stepArea && window.innerWidth < 600) {
                setTimeout(() => { stepArea.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
            }
        }

        function updateBlankHighlighting(pIdx, currentStep, questions) {
            const passageEl = document.getElementById('passage-' + pIdx);
            if (!passageEl) return;
            const blanks = passageEl.querySelectorAll('.cloze-blank');
            blanks.forEach(blank => blank.classList.remove('current', 'answered', 'wrong-mark'));
            const currentBlank = document.getElementById('blank-' + pIdx + '-' + currentStep);
            if (currentBlank) currentBlank.classList.add('current');
            questions.forEach((q, qIdx) => {
                const blank = document.getElementById('blank-' + pIdx + '-' + qIdx);
                if (!blank) return;
                const ans = userAnswers[q.id];
                if (ans && ans !== '') {
                    if (currentMode === 'review' || ans.toLowerCase() === q.answer.toLowerCase()) {
                        blank.classList.add('answered');
                        blank.textContent = ans;
                    } else {
                        blank.classList.add('wrong-mark');
                        blank.textContent = ans;
                    }
                } else {
                    blank.textContent = '[' + (qIdx + 1) + ']';
                }
            });
        }

        function selectStepOption(pIdx, stepIdx, value, btnElement) {
            if (currentMode === 'review') return;
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (!mod) return;
            const q = mod.parts[pIdx].questions[stepIdx];
            if (!q) return;
            const qId = q.id;
            const prevAnswer = userAnswers[qId];
            userAnswers[qId] = value;
            const optionsEl = document.getElementById('step-options-' + pIdx);
            if (optionsEl) {
                optionsEl.querySelectorAll('.step-option-btn').forEach(b => b.classList.remove('selected'));
            }
            btnElement.classList.add('selected');
            checkStepQuestion(pIdx, stepIdx, q);
            updateBlankHighlighting(pIdx, stepIdx, mod.parts[pIdx].questions);
            updateScoreBar();
            // Wrongbook
            if (value !== q.answer) {
                if (!isInWrongbook(qId)) {
                    addToWrongbook(qId, q, mod.id, mod.title, 'step', mod.parts[pIdx].type, value);
                } else {
                    wrongbookData[qId].userAnswer = value;
                    wrongbookData[qId].timestamp = Date.now();
                    saveWrongbook();
                    updateWrongbookBadge();
                }
            }
        }

        function checkStepQuestion(pIdx, stepIdx, q) {
            const userAnswer = userAnswers[q.id];
            if (!userAnswer) return;
            const isCorrect = (userAnswer.toLowerCase() === q.answer.toLowerCase());
            const analysisEl = document.getElementById('step-analysis-' + pIdx);
            if (analysisEl) analysisEl.classList.add('show');
            const optionsEl = document.getElementById('step-options-' + pIdx);
            if (optionsEl) {
                optionsEl.querySelectorAll('.step-option-btn').forEach(btn => {
                    const val = btn.getAttribute('data-value');
                    if (val === q.answer) btn.classList.add('correct-show');
                    if (val === userAnswer && !isCorrect) btn.classList.add('wrong-show');
                });
            }
            updateBlankHighlighting(pIdx, stepIdx, allData.modules.find(m => m.id === currentModuleId).parts[pIdx].questions);
        }

        function stepNav(pIdx, direction) {
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (!mod) return;
            const questions = mod.parts[pIdx].questions;
            const currentStep = stepStates[pIdx] || 0;
            const newStep = currentStep + direction;
            if (newStep < 0 || newStep >= questions.length) {
                if (direction > 0 && currentStep >= questions.length - 1) {
                    updateScoreBar();
                    document.getElementById('scoreBar').classList.add('show');
                    document.getElementById('scoreBar').scrollIntoView({ behavior: 'smooth' });
                }
                return;
            }
            stepStates[pIdx] = newStep;
            updateStepDisplay(pIdx);
        }

        function jumpToStep(pIdx, stepIdx) {
            stepStates[pIdx] = stepIdx;
            updateStepDisplay(pIdx);
            const stepArea = document.getElementById('step-area-' + pIdx);
            if (stepArea) stepArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // ==================== STANDARD QUESTION ====================
        function renderStandardQuestion(q, type, pIdx, qIdx) {
            const qId = q.id || (pIdx + '_' + qIdx);
            let html = '<div class="question-card" id="card-' + qId + '">';
            html += '<button class="wrongbook-btn" data-qid="' + qId + '" onclick="event.stopPropagation();toggleWrongbook(\'' + qId + '\', this)">📖 加错题本</button>';
            html += '<span class="question-num">' + ((qIdx || 0) + 1) + '</span>';
            html += '<span class="question-stem">' + q.stem + '</span>';

            const isMC = (type === '语法选择' || type === '词汇选择' || type === '完形填空' || type === '阅读理解');
            const isFill = (type === '短文填空' || type === '词形填空' || type === '回答问题');

            if (isMC) {
                html += '<ul class="options-list">';
                q.options.forEach(opt => {
                    html += '<li><button class="option-item" data-qid="' + qId + '" data-value="' + opt.label + '" onclick="selectStandardOption(this, \'' + qId + '\', \'' + opt.label + '\', \'' + type + '\')">' + opt.label + '. ' + opt.text + '</button></li>';
                });
                html += '</ul>';
            } else if (isFill) {
                const placeholder = type === '回答问题' ? '请输入你的答案...' : '请输入答案...';
                html += '<input type="text" class="fill-input" id="fill-' + qId + '" data-qid="' + qId + '" placeholder="' + placeholder + '" onchange="fillStandardAnswer(this, \'' + qId + '\', \'' + type + '\')">';
                if (type === '回答问题') {
                    html += '<button class="btn btn-outline" style="margin-left:0.4rem;padding:0.35rem 0.7rem;font-size:0.75rem;" onclick="toggleReference(\'ref-' + qId + '\')">📖 参考答案</button>';
                    html += '<div class="reference-answer" id="ref-' + qId + '">';
                    html += '<strong>✅ 参考答案：</strong>' + (q.referenceAnswer || '暂无');
                    html += '<div class="scoring-points"><strong>🎯 踩分点：</strong>' + (q.scoringPoints || '暂无') + '</div>';
                    html += '</div>';
                }
            }

            if (q.analysis) {
                html += '<div class="analysis-box" id="analysis-' + qId + '">💡 ' + q.analysis + '</div>';
            }
            html += '</div>';
            return html;
        }

        function selectStandardOption(btn, qId, value, type) {
            if (currentMode === 'review') return;
            const card = document.getElementById('card-' + qId);
            if (!card) return;
            card.querySelectorAll('.option-item').forEach(b => {
                b.classList.remove('selected', 'correct-answer', 'wrong-answer');
            });
            btn.classList.add('selected');
            userAnswers[qId] = value;
            checkStandardQuestion(qId, type);
        }

        function fillStandardAnswer(input, qId, type) {
            if (currentMode === 'review') return;
            userAnswers[qId] = input.value.trim();
            if (type !== '回答问题') {
                checkStandardQuestion(qId, type);
            }
        }

        function checkStandardQuestion(qId, type) {
            const q = findQuestionById(qId);
            if (!q) return;
            const userAnswer = userAnswers[qId];
            if (userAnswer === undefined || userAnswer === '') return;

            const card = document.getElementById('card-' + qId);
            const analysisBox = document.getElementById('analysis-' + qId);
            const correctAns = q.answer || q.referenceAnswer || '';
            const isCorrect = (userAnswer.toLowerCase() === correctAns.toLowerCase());

            card.classList.remove('correct', 'wrong');
            card.classList.add(isCorrect ? 'correct' : 'wrong');
            if (analysisBox) analysisBox.classList.add('show');

            const optionBtns = card.querySelectorAll('.option-item');
            optionBtns.forEach(btn => {
                const btnValue = btn.getAttribute('data-value');
                if (btnValue === correctAns) btn.classList.add('correct-answer');
                if (btnValue === userAnswer && !isCorrect) btn.classList.add('wrong-answer');
            });

            const fillInput = card.querySelector('.fill-input');
            if (fillInput) {
                fillInput.classList.remove('correct-fill', 'wrong-fill');
                fillInput.classList.add(isCorrect ? 'correct-fill' : 'wrong-fill');
            }

            updateScoreBar();

            // Wrongbook
            if (!isCorrect && correctAns !== '') {
                const mod = allData.modules.find(m => m.parts.some(p => p.questions && p.questions.some(qq => qq.id === qId)));
                if (mod) {
                    const part = mod.parts.find(p => p.questions && p.questions.some(qq => qq.id === qId));
                    if (!isInWrongbook(qId)) {
                        addToWrongbook(qId, q, mod.id, mod.title, 'standard', part ? part.type : type, userAnswer);
                    } else {
                        wrongbookData[qId].userAnswer = userAnswer;
                        wrongbookData[qId].timestamp = Date.now();
                        saveWrongbook();
                        updateWrongbookBadge();
                    }
                }
            }
        }

        function renderTemplate(tpl, tIdx) {
            let html = '<div class="template-card">';
            html += '<h3>📝 ' + tpl.title + '</h3>';
            html += '<div class="template-suitable">📌 适用：' + tpl.suitable + '</div>';
            html += '<div class="template-structure">' + tpl.structure + '</div>';
            if (tpl.example) {
                html += '<div class="template-example">' + tpl.example + '</div>';
            }
            html += '</div>';
            return html;
        }

        // ==================== COMMON ====================
        function findQuestionById(qId) {
            if (!allData) return null;
            for (const mod of allData.modules) {
                for (const part of mod.parts) {
                    if (part.questions) {
                        for (const q of part.questions) {
                            if (q.id === qId) return q;
                        }
                    }
                }
            }
            return null;
        }

        function checkAll() {
            document.querySelectorAll('.question-card').forEach(card => {
                const qId = card.id.replace('card-', '');
                if (userAnswers[qId] !== undefined && userAnswers[qId] !== '') {
                    checkStandardQuestion(qId, '');
                }
            });
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (mod) {
                mod.parts.forEach((part, pIdx) => {
                    if ((part.type === '完形填空' || part.type === '阅读理解') && part.questions) {
                        part.questions.forEach((q, qIdx) => {
                            if (userAnswers[q.id] !== undefined && userAnswers[q.id] !== '') {
                                checkStepQuestion(pIdx, qIdx, q);
                            }
                        });
                        updateStepDisplay(pIdx);
                    }
                });
            }
            updateScoreBar();
            document.getElementById('scoreBar').classList.add('show');
            document.getElementById('scoreBar').scrollIntoView({ behavior: 'smooth' });
        }

        function resetAll() {
            userAnswers = {};
            stepStates = {};
            document.querySelectorAll('.question-card').forEach(card => {
                card.classList.remove('correct', 'wrong');
            });
            document.querySelectorAll('.option-item').forEach(btn => {
                btn.classList.remove('selected', 'correct-answer', 'wrong-answer');
            });
            document.querySelectorAll('.fill-input').forEach(input => {
                input.value = '';
                input.classList.remove('correct-fill', 'wrong-fill');
            });
            document.querySelectorAll('.analysis-box').forEach(box => box.classList.remove('show'));
            document.querySelectorAll('.reference-answer').forEach(ref => ref.classList.remove('show'));
            document.querySelectorAll('.step-analysis').forEach(box => box.classList.remove('show'));
            document.querySelectorAll('.step-option-btn').forEach(btn => {
                btn.classList.remove('selected', 'correct-show', 'wrong-show');
            });
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (mod) {
                mod.parts.forEach((part, pIdx) => {
                    if (part.type === '完形填空' || part.type === '阅读理解') {
                        stepStates[pIdx] = 0;
                        updateStepDisplay(pIdx);
                    }
                });
            }
            document.getElementById('scoreBar').classList.remove('show');
            updateWrongbookButtons();
        }

        function showAllAnalysis() {
            document.querySelectorAll('.analysis-box').forEach(box => box.classList.add('show'));
            document.querySelectorAll('.step-analysis').forEach(box => box.classList.add('show'));
        }

        function revealAllAnswers() {
            document.querySelectorAll('.analysis-box').forEach(box => box.classList.add('show'));
            document.querySelectorAll('.reference-answer').forEach(ref => ref.classList.add('show'));
            document.querySelectorAll('.step-analysis').forEach(box => box.classList.add('show'));
            document.querySelectorAll('.question-card').forEach(card => {
                const qId = card.id.replace('card-', '');
                const q = findQuestionById(qId);
                if (!q) return;
                const correctAns = q.answer || q.referenceAnswer || '';
                card.querySelectorAll('.option-item').forEach(btn => {
                    if (btn.getAttribute('data-value') === correctAns) btn.classList.add('correct-answer');
                });
                const fillInput = card.querySelector('.fill-input');
                if (fillInput && correctAns) {
                    fillInput.value = correctAns;
                    fillInput.classList.add('correct-fill');
                }
            });
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (mod) {
                mod.parts.forEach((part, pIdx) => {
                    if ((part.type === '完形填空' || part.type === '阅读理解') && part.questions) {
                        part.questions.forEach((q, qIdx) => {
                            if (!userAnswers[q.id] || userAnswers[q.id] === '') {
                                userAnswers[q.id] = q.answer;
                            }
                        });
                        updateStepDisplay(pIdx);
                        const analysisEl = document.getElementById('step-analysis-' + pIdx);
                        if (analysisEl) analysisEl.classList.add('show');
                    }
                });
            }
        }

        function toggleReference(refId) {
            const ref = document.getElementById(refId);
            if (ref) ref.classList.toggle('show');
        }

        function updateScoreBar() {
            let total = 0;
            let correct = 0;
            Object.keys(userAnswers).forEach(qId => {
                const q = findQuestionById(qId);
                if (!q) return;
                if (userAnswers[qId] !== undefined && userAnswers[qId] !== '') {
                    total++;
                    const correctAns = q.answer || q.referenceAnswer || '';
                    if (userAnswers[qId].toLowerCase() === correctAns.toLowerCase()) correct++;
                }
            });
            document.getElementById('scoreNum').textContent = correct + '/' + total;
            const pct = total > 0 ? Math.round(correct / total * 100) : 0;
            let msg = '';
            if (total === 0) msg = '请开始答题';
            else if (pct >= 90) msg = '🌟 优秀！你的基础非常扎实！';
            else if (pct >= 70) msg = '👍 良好！继续加油！';
            else if (pct >= 50) msg = '📖 还需努力，注意复习错题。';
            else msg = '💪 别灰心，错题是最好的老师！';
            document.getElementById('scoreText').textContent = msg;
            if (total > 0) document.getElementById('scoreBar').classList.add('show');
        }

        function setMode(mode) {
            if (mode === 'wrongbook') {
                preWrongbookModuleId = currentModuleId;
                currentMode = 'wrongbook';
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('wrongbookBtn').classList.add('active');
                document.getElementById('moduleSelect').disabled = true;
                renderWrongbookMode();
                document.getElementById('scoreBar').classList.remove('show');
                document.getElementById('knowledgeCard').style.display = 'none';
                document.getElementById('actionBtns').style.display = 'none';
                return;
            }
            currentMode = mode;
            document.getElementById('moduleSelect').disabled = false;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.mode-btn[data-mode="' + mode + '"]').classList.add('active');
            if (mode === 'wrongbook') return;
            resetAll();
            if (mode === 'review') {
                revealAllAnswers();
            }
            const mod = allData.modules.find(m => m.id === currentModuleId);
            if (mod) {
                const hasQ = mod.parts.some(p => p.questions && p.questions.length > 0);
                document.getElementById('actionBtns').style.display = hasQ ? 'flex' : 'none';
                document.getElementById('knowledgeCard').style.display = mod.knowledge ? 'block' : 'none';
            }
            updateWrongbookButtons();
        }

        function goBack() {
            if (currentMode === 'wrongbook') {
                currentMode = 'practice';
                document.getElementById('moduleSelect').disabled = false;
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.mode-btn[data-mode="practice"]').classList.add('active');
                currentModuleId = preWrongbookModuleId;
                document.getElementById('moduleSelect').value = currentModuleId;
                renderModule(currentModuleId);
                return;
            }
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
