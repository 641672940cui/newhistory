<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>东东题库 - 材料大题</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #eef5fb 0%, #e3eff9 30%, #f5f9fd 100%);
            min-height: 100vh;
            padding-bottom: 20px;
            color: #2c3e50;
            line-height: 1.7;
        }
        .app-header {
            background: linear-gradient(135deg, #5b9bd5 0%, #4a8bc2 40%, #3d7ab8 100%);
            color: #fff;
            padding: 0.9rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 0 0 16px 16px;
        }
        .app-header h1 { font-size: 1.5rem; margin: 0; }
        .app-header .subtitle { font-size: 0.8rem; opacity: 0.9; }
        .back-home-link {
            display: inline-block;
            margin-top: 0.3rem;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            text-decoration: underline;
        }
        .main-content { max-width: 600px; margin: 0 auto; padding: 0.7rem 0.8rem; }
        .btn {
            background: #5b9bd5;
            color: #fff;
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 22px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-outline {
            background: #fff;
            border: 2px solid #5b9bd5;
            color: #5b9bd5;
        }
        .question-card {
            background: #fff;
            border: 1.5px solid #dceaf5;
            border-radius: 14px;
            padding: 0.9rem;
            margin-bottom: 1rem;
        }
        .material-box {
            background: #f8fbfe;
            border-left: 4px solid #5b9bd5;
            padding: 0.8rem;
            margin: 0.5rem 0;
            font-size: 0.88rem;
            line-height: 1.8;
        }
        .fill-blank-input {
            border: none;
            border-bottom: 2px solid #5b9bd5;
            padding: 0.2rem 0.5rem;
            font-size: 1rem;
            width: 140px;
            text-align: center;
            background: #fafcfe;
        }
        .fill-blank-input.correct-fill { border-bottom-color: #2d8a4e; background: #f4faf6; color: #2d8a4e; }
        .fill-blank-input.wrong-fill { border-bottom-color: #e74c3c; background: #fef8f7; color: #e74c3c; }
        .fill-hint { font-size: 0.7rem; color: #8aabc8; margin-left: 0.3rem; }
        .nav-buttons { display: flex; gap: 0.5rem; margin: 0.5rem 0; }
        .collapse-header {
            background: #f0f7fd;
            padding: 0.7rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
        }
        .collapse-body { display: none; padding: 0.6rem; background: #fafcfe; font-size: 0.82rem; }
        .review-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .review-table td { padding: 0.35rem 0.5rem; border-bottom: 1px solid #e0edf8; }
        .correct-mark { color: #2d8a4e; font-weight: 700; }
        .wrong-mark { color: #e74c3c; font-weight: 700; }
        .stats-panel { display: flex; gap: 0.4rem; margin: 0.6rem 0; justify-content: center; }
        .stat-tag { background: #e8f2fa; padding: 0.3rem 0.7rem; border-radius: 12px; font-size: 0.72rem; }
        .streak-tag { background: #fff3e0; color: #e65100; }
        h3 { color: #3d7ab8; text-align: center; margin-bottom: 0.5rem; }
        .score-detail { font-size: 0.7rem; color: #6a9ab8; margin-left: 0.5rem; }
    </style>
</head>
<body>

<div class="app-header">
    <span class="header-emoji">📜</span>
    <h1 id="header-title">东东题库 · 材料大题</h1>
    <div class="subtitle" id="header-subtitle">智能评分 · 中考标准</div>
    <a class="back-home-link" href="./">← 返回首页</a>
</div>

<div class="main-content" id="main-content">
    <div style="text-align:center;padding:2rem;">加载中...</div>
</div>

<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const subject = params.get('subject') || 'history';
    const dataUrl = `data/material-${subject}.json`;

    let materialQuestions = [];
    let subjectName = '历史';
    let materialStates = {};
    let currentStreak = parseInt(localStorage.getItem(`material-${subject}-streak`) || '0');
    let bestStreak = parseInt(localStorage.getItem(`material-${subject}-bestStreak`) || '0');

    const encourageMessages = {
        correct: ['答对了！👏', '太棒了！💪', '优秀！🎯'],
        wrong: ['别灰心，加油！💪', '再试试看～'],
        complete: ['完美通关！🏆', '太厉害了！🎉'],
        streak: { 3: '🔥 三连击！', 5: '💯 五连击！' }
    };

    function randomPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function saveStreak() { 
        localStorage.setItem(`material-${subject}-streak`, currentStreak);
        localStorage.setItem(`material-${subject}-bestStreak`, bestStreak);
    }

    function showStreakToast(message) {
        const toast = document.createElement('div');
        toast.className = 'streak-toast';
        toast.textContent = message;
        toast.style.cssText = 'position:fixed;top:90px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff6b6b,#ff8c00);color:#fff;padding:0.5rem 1.2rem;border-radius:20px;font-weight:700;z-index:300;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }

    function checkStreakEncourage() {
        const streaks = Object.keys(encourageMessages.streak).map(Number).sort((a,b)=>b-a);
        for (let threshold of streaks) {
            if (currentStreak === threshold) { showStreakToast(encourageMessages.streak[threshold]); break; }
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== 智能评分核心函数 ====================
    
    /**
     * 基础关键词匹配（支持包含匹配）
     */
    function keywordMatch(userAnswer, keyword, synonyms = []) {
        const allKeywords = [keyword.toLowerCase(), ...synonyms.map(s => s.toLowerCase())];
        const userLower = userAnswer.toLowerCase();
        return allKeywords.some(kw => userLower.includes(kw));
    }

    /**
     * 多关键词组合评分（AND关系，必须全部包含）
     */
    function scoreByMultiKeywordAnd(userAnswer, config) {
        const { requiredKeywords, maxScore = 1 } = config;
        let allMatched = true;
        for (let req of requiredKeywords) {
            if (!keywordMatch(userAnswer, req.keyword, req.synonyms || [])) {
                allMatched = false;
                break;
            }
        }
        return allMatched ? maxScore : 0;
    }

    /**
     * 多关键词组合评分（OR关系，包含任意一个即得分）
     */
    function scoreByMultiKeywordOr(userAnswer, config) {
        const { requiredKeywords, maxScore = 1 } = config;
        for (let req of requiredKeywords) {
            if (keywordMatch(userAnswer, req.keyword, req.synonyms || [])) {
                return maxScore;
            }
        }
        return 0;
    }

    /**
     * 多要点评分（每个关键词独立给分，可部分得分）
     */
    function scoreByMultiPoint(userAnswer, config) {
        const { points, maxScore } = config;
        let earned = 0;
        for (let point of points) {
            if (keywordMatch(userAnswer, point.keyword, point.synonyms || [])) {
                earned += point.score;
            }
        }
        return Math.min(earned, maxScore);
    }

    /**
     * 开放性试题评分（基于关键词库，言之成理即可）
     */
    function scoreByOpenEnded(userAnswer, config) {
        const { expectedConcepts, maxScore = 2, flexibleMode = true } = config;
        let earned = 0;
        
        // 预定义同义词库
        const conceptSynonyms = {
            '民族独立': ['独立', '主权', '自主', '民族解放', '摆脱殖民'],
            '国情': ['国情', '实际情况', '本国', '自身特点', '具体国情'],
            '解放思想': ['思想解放', '思想', '观念更新', '破除迷信'],
            '与时俱进': ['与时俱进', '发展', '进步', '创新', '变革'],
            '改革开放': ['改革', '开放', '创新', '发展'],
            '学习西方': ['学习西方', '师夷长技', '向西方学习', '引进技术'],
            '制度变革': ['制度', '变革', '改革', '变法', '维新']
        };
        
        for (let concept of expectedConcepts) {
            const keywords = conceptSynonyms[concept] || [concept];
            if (keywords.some(kw => userAnswer.toLowerCase().includes(kw.toLowerCase()))) {
                earned += Math.floor(maxScore / expectedConcepts.length);
                if (earned >= maxScore) break;
            }
        }
        
        // 宽松模式：只要不是空话就给基础分
        if (flexibleMode && earned === 0 && userAnswer.length > 5) {
            earned = 1;
        }
        
        return Math.min(earned, maxScore);
    }

    /**
     * 主评分函数：根据配置类型调用对应评分器
     */
    function scoreByRules(userAnswer, scoringRules) {
        if (!scoringRules) {
            // 兼容旧格式：使用传统匹配
            return 0;
        }
        
        const { type, config } = scoringRules;
        
        switch (type) {
            case 'multi_keyword_and':
                return scoreByMultiKeywordAnd(userAnswer, config);
            case 'multi_keyword_or':
                return scoreByMultiKeywordOr(userAnswer, config);
            case 'multi_point':
                return scoreByMultiPoint(userAnswer, config);
            case 'open_ended':
                return scoreByOpenEnded(userAnswer, config);
            default:
                return 0;
        }
    }

    /**
     * 获取某空的理论最高分
     */
    function getBlankMaxScore(blank) {
        if (blank.scoringRules) {
            const { config } = blank.scoringRules;
            return config.maxScore || blank.score || 1;
        }
        return blank.score || 1;
    }

    function renderMaterialView() {
        const container = document.getElementById('main-content');
        let allCompleted = true;
        let html = '<h3>📜 材料解析大题 <span style="font-size:0.7rem;">智能评分·中考标准</span></h3>';
        
        if (materialQuestions.length === 0) {
            html += '<div style="text-align:center;padding:2rem;color:#8aabc8;">暂无材料题数据，请检查 data/material-' + subject + '.json 文件</div>';
        }
        
        materialQuestions.forEach(mat => {
            if (!materialStates[mat.id]) materialStates[mat.id] = { submitted: false, userAnswers: {}, scoreDetails: {} };
            const state = materialStates[mat.id];
            const isSubmitted = state.submitted;
            const totalScore = mat.totalScore || mat.blanks.reduce((sum, b) => sum + getBlankMaxScore(b), 0);
            
            if (!isSubmitted) allCompleted = false;
            
            html += `<div class="question-card" data-matid="${mat.id}">
                <div style="font-weight:700;color:#3d7ab8;margin-bottom:0.5rem;font-size:1.1rem;">${mat.title}</div>
                <div class="material-box">${mat.material.replace(/\n/g,'<br>')}</div>
                <div style="font-size:0.95rem;color:#4a5f70;margin:0.5rem 0;background:#f0f7fd;padding:0.5rem;border-radius:8px;">📋 ${mat.question}</div>
                <div class="fill-blanks-area" style="margin:0.8rem 0;">`;
            
            mat.blanks.forEach(blank => {
                const userVal = state.userAnswers[blank.id] || '';
                const maxScore = getBlankMaxScore(blank);
                let inputClass = '';
                let earnedScore = 0;
                
                if (isSubmitted) {
                    earnedScore = state.scoreDetails[blank.id] || 0;
                    const isFullScore = earnedScore === maxScore;
                    inputClass = isFullScore ? 'correct-fill' : (earnedScore > 0 ? 'correct-fill' : 'wrong-fill');
                }
                
                html += `<div style="margin:0.6rem 0;display:flex;align-items:center;flex-wrap:wrap;gap:0.3rem;">
                    <span style="font-weight:700;color:#3d7ab8;min-width:45px;">${blank.label || blank.id}</span>
                    <input type="text" class="fill-blank-input ${inputClass}" data-matid="${mat.id}" data-blank-id="${blank.id}" 
                        value="${escapeHtml(userVal)}" placeholder="${blank.hint || '请输入'}" ${isSubmitted ? 'disabled' : ''}
                        style="flex:1;min-width:120px;">
                    ${!isSubmitted ? `<span class="fill-hint">💡 ${blank.hint || ''}</span>` : ''}
                    ${isSubmitted && earnedScore < maxScore ? `<span class="score-detail">得分：${earnedScore}/${maxScore}</span>` : ''}
                </div>`;
            });
            html += `</div>`;
            
            if (!isSubmitted) {
                html += `<div class="nav-buttons">
                    <button class="btn" data-mat-submit="${mat.id}">✅ 提交答案（智能批改）</button>
                </div>`;
            } else {
                const earnedScore = state.score || 0;
                html += `<div style="margin:0.6rem 0;padding:0.5rem;background:#e8f2fa;border-radius:10px;">
                    <span style="font-weight:700;">📊 总分：${earnedScore} / ${totalScore} 分</span>
                    <button class="btn-outline" style="margin-left:0.8rem;padding:0.2rem 0.8rem;font-size:0.75rem;" data-mat-reset="${mat.id}">🔄 重做</button>
                </div>`;
            }
            
            html += `<div class="collapse-header" data-mat-collapse="${mat.id}">
                📖 查看答案解析 <span class="collapse-arrow">▼</span>
            </div>
            <div class="collapse-body" data-mat-body="${mat.id}" style="display:none;">
                <strong>📝 逐空解析：</strong><table class="review-table">`;
            
            mat.blanks.forEach(blank => {
                const userVal = state.userAnswers[blank.id] || '未作答';
                const maxScore = getBlankMaxScore(blank);
                const earnedScore = isSubmitted ? (state.scoreDetails[blank.id] || 0) : 0;
                const isFullScore = earnedScore === maxScore;
                
                // 获取正确答案展示（从scoringRules或传统answers）
                let correctDisplay = '';
                if (blank.scoringRules) {
                    const { type, config } = blank.scoringRules;
                    if (type === 'multi_point' && config.points) {
                        correctDisplay = config.points.map(p => p.keyword).join('、');
                    } else if (type === 'multi_keyword_and' && config.requiredKeywords) {
                        correctDisplay = config.requiredKeywords.map(p => p.keyword).join(' + ');
                    } else if (type === 'open_ended' && config.expectedConcepts) {
                        correctDisplay = config.expectedConcepts.join('、') + '（言之成理即可）';
                    } else {
                        correctDisplay = '参考答案解析';
                    }
                } else {
                    correctDisplay = blank.answers ? blank.answers.slice(0, 3).join('、') : '参考答案解析';
                }
                
                html += `<tr><td class="step-label">${blank.label || blank.id}（${maxScore}分）</td>
                    <td>你的答案：${escapeHtml(userVal)}<br>评分标准：${escapeHtml(correctDisplay)}<br>
                    <span style="font-size:0.75rem;color:#6a9ab8;">💡 ${blank.explanation || ''}</span>
                    ${isSubmitted ? (isFullScore ? '<span class="correct-mark"> ✓ 满分</span>' : `<span class="wrong-mark"> ✗ 得${earnedScore}分</span>`) : ''}
                    <\/td>
                <\/tr>`;
            });
            html += `<\/table><strong>📌 题型总结：<\/strong>${mat.reviewSummary}<br><br>
                <strong>📝 完整参考答案：<\/strong>${mat.fullAnswer}
            <\/div>
            <\/div>`;
        });
        
        html += `<div class="stats-panel">
            ${currentStreak > 0 ? `<span class="stat-tag streak-tag">🔥 当前连击：${currentStreak}</span>` : ''}
            ${bestStreak > 0 ? `<span class="stat-tag">🏆 最佳连击：${bestStreak}</span>` : ''}
        </div>`;
        
        container.innerHTML = html;
        
        container.querySelectorAll('.fill-blank-input:not([disabled])').forEach(input => {
            input.addEventListener('change', function() {
                const matId = this.dataset.matid;
                const blankId = this.dataset.blankId;
                if (!materialStates[matId]) materialStates[matId] = { submitted: false, userAnswers: {} };
                if (!materialStates[matId].submitted) {
                    materialStates[matId].userAnswers[blankId] = this.value;
                }
            });
        });
        
        container.querySelectorAll('[data-mat-submit]').forEach(btn => {
            btn.addEventListener('click', function() { handleMaterialSubmit(this.dataset.matSubmit); });
        });
        
        container.querySelectorAll('[data-mat-reset]').forEach(btn => {
            btn.addEventListener('click', function() { resetMaterialQuestion(this.dataset.matReset); });
        });
        
        container.querySelectorAll('.collapse-header').forEach(header => {
            header.addEventListener('click', function() {
                this.classList.toggle('open');
                const body = document.querySelector(`[data-mat-body="${this.dataset.matCollapse}"]`);
                if (body) { body.style.display = body.style.display === 'none' ? 'block' : 'none'; }
            });
        });
    }

    function handleMaterialSubmit(matId) {
        const mat = materialQuestions.find(m => m.id === matId);
        const state = materialStates[matId];
        if (!mat || !state) return;
        if (state.submitted) { alert('本题已经提交过了！如需重做请点击"重做"按钮。'); return; }
        
        let totalEarned = 0;
        const scoreDetails = {};
        
        mat.blanks.forEach(blank => {
            const userVal = state.userAnswers[blank.id] || '';
            let earned = 0;
            
            if (blank.scoringRules) {
                // 使用智能评分
                earned = scoreByRules(userVal, blank.scoringRules);
            } else if (blank.answers) {
                // 兼容旧格式：使用传统匹配
                const matchResult = blank.answers.some(ans => 
                    userVal.trim().toLowerCase() === ans.toLowerCase() ||
                    userVal.trim().toLowerCase().includes(ans.toLowerCase())
                );
                earned = matchResult ? (blank.score || 1) : 0;
            }
            
            scoreDetails[blank.id] = earned;
            totalEarned += earned;
        });
        
        state.submitted = true;
        state.score = totalEarned;
        state.scoreDetails = scoreDetails;
        
        const totalMaxScore = mat.totalScore || mat.blanks.reduce((sum, b) => sum + getBlankMaxScore(b), 0);
        
        if (totalEarned === totalMaxScore) {
            currentStreak++;
            if (currentStreak > bestStreak) { bestStreak = currentStreak; saveStreak(); }
            checkStreakEncourage();
        } else {
            currentStreak = 0;
            saveStreak();
        }
        
        renderMaterialView();
    }

    function resetMaterialQuestion(matId) {
        if (confirm('确定要重做本题吗？之前的答案将被清空。')) {
            materialStates[matId] = { submitted: false, userAnswers: {}, score: null, scoreDetails: {} };
            renderMaterialView();
        }
    }

    async function init() {
        try {
            const response = await fetch(dataUrl);
            if (!response.ok) throw new Error('材料题加载失败: ' + response.status);
            const data = await response.json();
            materialQuestions = data.materialQuestions || [];
            subjectName = data.subjectName || '历史';
            document.getElementById('header-title').textContent = `东东题库 · ${subjectName}材料大题`;
            document.getElementById('header-subtitle').textContent = '智能评分 · 中考标准 · 多关键词匹配';
            document.title = `东东的${subjectName}材料大题`;
            renderMaterialView();
            console.log('📜 材料题已就绪！共 ' + materialQuestions.length + ' 道大题 | 智能评分引擎已启用');
        } catch (err) {
            console.error('材料题加载错误:', err);
            document.getElementById('main-content').innerHTML = `<div style="text-align:center;padding:3rem;color:#e74c3c;">
                <h3>⚠️ 材料题加载失败</h3>
                <p>请检查 data/material-${subject}.json 文件是否存在</p>
                <p style="font-size:0.8rem;color:#8aabc8;">错误信息：${err.message}</p>
                <a href="./" style="color:#3d7ab8;">← 返回首页</a>
            </div>`;
        }
    }
    init();
})();
</script>
</body>
</html>
